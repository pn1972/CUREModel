<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useMemo } = React;

        const rubrics = [
          {
            id: 'C', name: 'Clinical Performance', title: 'ประสิทธิภาพและความน่าเชื่อถือทางคลินิก', icon: 'activity',
            color: 'text-blue-600', bgLine: 'border-blue-500',
            questions: [
              { id: 'C1', title: 'ความแม่นยำและการตรวจสอบในบริบทจริง', desc: 'AI มีหลักฐานความแม่นยำที่ตรวจสอบได้ และได้รับการทดสอบกับข้อมูลหรือผู้ป่วย in-context ของไทยหรือไม่', isCritical: true, options: [{ score: 2, label: 'ดีมาก', detail: '• ตรวจสอบในสภาพแวดล้อมคลินิกจริง (Real-world)\n• ทดสอบใน Sandbox ที่ใกล้เคียงจริง\n• มีตัวชี้วัดประสิทธิภาพครบถ้วน\n• ข้อมูลเปรียบเทียบประชากรไทยชัดเจน' }, { score: 1, label: 'พอใช้', detail: '• มีหลักฐานจากงานวิจัยภายนอกที่น่าเชื่อถือ\n• ยังไม่มีการตรวจสอบในสภาพคลินิกจริงของ รพ.\n• ตัวชี้วัดบางส่วนยังไม่ครบตามต้องการ' }, { score: 0, label: 'เสี่ยงสูง (Critical Stop)', detail: '• ไม่มีหลักฐานความแม่นยำอย่างเป็นระบบ\n• ไม่ระบุชุดข้อมูลที่ใช้ทดสอบ' }] },
              { id: 'C2', title: 'ความน่าเชื่อถือของผลลัพธ์และการจัดการความผิดพลาด', desc: 'ผลลัพธ์ของ AI มีความสม่ำเสมอ และมีการระบุ/จัดการ False positive หรือ False negative อย่างเหมาะสมหรือไม่', options: [{ score: 2, label: 'ดีมาก', detail: '• ประเมินความสม่ำเสมอใน Use case ชัดเจน\n• วิเคราะห์ FP/FN พร้อมผลกระทบทางคลินิก\n• มี Calibration curve/Threshold ชัดเจน\n• มี SOP รับมือเมื่อเกิดผลลัพธ์ที่ผิดพลาด' }, { score: 1, label: 'พอใช้', detail: '• มีข้อมูลความผิดพลาดหลักในภาพรวม\n• มี Threshold เบื้องต้นแต่ยังไม่ครอบคลุม\n• มีแนวทางรับมือแต่ยังไม่เป็น SOP ชัดเจน' }, { score: 0, label: 'เสี่ยงสูง', detail: '• ไม่ทราบอัตราความผิดพลาด\n• ไม่มีการวิเคราะห์ FP/FN ในเชิงคลินิก\n• ไม่มีแผนรับมือเมื่อผลลัพธ์ผิดพลาด' }] },
              { id: 'C3', title: 'ความครอบคลุมประชากรและสภาพทนทานของโมเดล', desc: 'AI ทำงานได้สม่ำเสมอในผู้ป่วยหลากหลายกลุ่ม อุปกรณ์ต่างกัน และเมื่อข้อมูลไม่สมบูรณ์หรือไม่', options: [{ score: 2, label: 'ดีมาก', detail: '• ทดสอบในหลายกลุ่มประชากร\n• วิเคราะห์กลุ่มย่อย (Subgroup เช่น อายุ เพศ โรคร่วม)\n• ทดสอบกับอุปกรณ์หลากหลายแบรนด์\n• ประเมินผลเมื่อข้อมูลไม่สมบูรณ์' }, { score: 1, label: 'พอใช้', detail: '• ทดสอบกลุ่มผู้ป่วยหลักที่พบบ่อย\n• ขาดข้อมูลกลุ่มย่อยที่สำคัญ\n• ข้อมูลจำกัดเฉพาะแบรนด์อุปกรณ์บางประเภท' }, { score: 0, label: 'เสี่ยงสูง', detail: '• ทดสอบกับกลุ่มข้อมูลจำกัด ไม่สะท้อนผู้ป่วยจริง\n• ไม่วิเคราะห์กลุ่มย่อย\n• ไม่ทราบผลกระทบเมื่อข้อมูลไม่สมบูรณ์' }] },
              { id: 'C4', title: 'วงจรชีวิตโมเดลและการติดตามประสิทธิภาพหลังใช้งาน', desc: 'มีการเฝ้าระวัง Model drift และมีแนวทาง Update/Rollback ตลอดจนมาตรการระงับใช้งานหรือไม่', options: [{ score: 2, label: 'ดีมาก', detail: '• มี Model lifecycle plan ชัดเจนก่อนและหลังใช้\n• ติดตาม Model drift ต่อเนื่อง\n• มีขั้นตอน Update และ Rollback ชัดเจน\n• กำหนดผู้รับผิดชอบและรอบทบทวนชัดเจน' }, { score: 1, label: 'พอใช้', detail: '• ติดตามประสิทธิภาพเป็นรอบ (6-12 เดือน)\n• ไม่มีระบบ Dashboard แบบอัตโนมัติ\n• มีแนวทาง Update แต่ Rollback ไม่ชัดเจน' }, { score: 0, label: 'เสี่ยงสูง', detail: '• ไม่มีแผนติดตามประสิทธิภาพหลังใช้\n• ไม่มีเกณฑ์ตรวจจับ Model drift\n• ไม่มีขั้นตอน Update/Rollback' }] }
            ]
          },
          {
            id: 'U', name: 'Usability & Value', title: 'ความพร้อมในการนำไปใช้และคุณค่าที่ได้รับ', icon: 'users',
            color: 'text-emerald-600', bgLine: 'border-emerald-500',
            questions: [
              { id: 'U1', title: 'การผสานกับขั้นตอนการทำงานและการยอมรับ', desc: 'AI เข้ากับกระบวนการทำงานจริงโดยไม่เพิ่มภาระ และมีแผน Change management หรือไม่', options: [{ score: 2, label: 'ดีมาก', detail: '• ผสาน Workflow เดิมได้อย่างราบรื่น\n• ลดภาระงานหรือลดเวลาลงอย่างชัดเจน\n• มีอบรมและกำหนด Super user ดูแลทีม\n• มีแผนจัดการการเปลี่ยนแปลงครบถ้วน' }, { score: 1, label: 'พอใช้', detail: '• ใช้ร่วมกับ Workflow เดิมได้แต่มีขั้นตอนเพิ่มขึ้นบ้าง\n• ผู้ใช้ยอมรับระดับหนึ่งแต่ยังไม่ทั่วถึง' }, { score: 0, label: 'เสี่ยงสูง', detail: '• เพิ่มภาระงานซับซ้อนขึ้นอย่างชัดเจน\n• ผู้ใช้หลักปฏิเสธการใช้งาน\n• รบกวนขั้นตอนดูแลผู้ป่วยเดิม' }] },
              { id: 'U2', title: 'ความสามารถในการอธิบายผลและการตีความ', desc: 'ผู้ใช้สามารถเข้าใจเหตุผล ที่มา และข้อจำกัดของผลลัพธ์ AI เพียงพอต่อการตัดสินใจหรือไม่', options: [{ score: 2, label: 'ดีมาก', detail: '• แสดงเหตุผลประกอบคลินิกชัดเจน (Heatmap ฯลฯ)\n• ระบุข้อจำกัดและข้อควรระวังชัดเจน\n• มีคู่มือการตีความผลลัพธ์ที่ถูกต้อง' }, { score: 1, label: 'พอใช้', detail: '• แสดงคะแนนความมั่นใจ (Confidence score) พื้นฐาน\n• อธิบายที่มาได้จำกัด\n• คู่มือการประเมินยังต้องปรับปรุง' }, { score: 0, label: 'เสี่ยงสูง', detail: '• เป็นระบบกล่องดำ (Black box) ตรวจสอบไม่ได้\n• ไม่แจ้งข้อจำกัดหรือกรณีอันตราย' }] },
              { id: 'U3', title: 'ความพร้อมด้าน IT สมรรถนะ และการเชื่อมต่อ', desc: 'โครงสร้าง IT รองรับความเร็ว เสถียรภาพ การเชื่อมต่อ HIS/PACS และขยายระบบได้หรือไม่', options: [{ score: 2, label: 'ดีมาก', detail: '• รองรับมาตรฐานสากล (HL7, FHIR, DICOM)\n• มี SLA ประกัน Uptime ระบบชัดเจน\n• มีแผน Backup/DR ครบถ้วน\n• เชื่อม HIS/PACS ได้อย่างปลอดภัย' }, { score: 1, label: 'พอใช้', detail: '• เชื่อมระบบหลักได้บางส่วน\n• สมรรถนะพอทดลองใช้แต่ต้องการการทดสอบเพิ่มเพื่อขยายผล' }, { score: 0, label: 'เสี่ยงสูง', detail: '• ต้องลงทุนโครงสร้างพื้นฐานใหม่มหาศาล\n• ระบบช้าและล่มบ่อย\n• ไม่มีแผนสำรองข้อมูลเพื่อความปลอดภัย' }] },
              { id: 'U4', title: 'คุณค่า ความคุ้มทุน และความยั่งยืน', desc: 'AI สร้างคุณค่าที่วัดได้ต่อผู้ป่วย/บุคลากร และคุ้มทุนในระยะยาวหรือไม่', options: [{ score: 2, label: 'ดีมาก', detail: '• มี KPI วัดได้ชัดเจน (ลดเวลานอน/ลดผลลัพธ์ผิดพลาด)\n• ประเมินต้นทุนรวม (TCO) ครอบคลุม\n• สอดคล้องยุทธศาสตร์ของโรงพยาบาล\n• มีแผนงบประมาณความยั่งยืนระยะยาว' }, { score: 1, label: 'พอใช้', detail: '• คาดว่ามีประโยชน์แต่ยังไม่มีตัวเลขยืนยัน\n• ต้องนำร่อง (Pilot) เพื่อเก็บข้อมูลที่แท้จริง\n• ประเมินต้นทุนยังไม่คลุมระยะยาว' }, { score: 0, label: 'เสี่ยงสูง', detail: '• ค่าใช้จ่ายสูงกว่าประโยชน์เชิงระบบชัดเจน\n• ไม่มีแผนงบประมาณรองรับหลังช่วงทดลองใช้' }] }
            ]
          },
          {
            id: 'R', name: 'Regulation & Risk', title: 'กฎระเบียบ ความเสี่ยง และธรรมาภิบาล', icon: 'file-signature',
            color: 'text-purple-600', bgLine: 'border-purple-500',
            questions: [
              { id: 'R1', title: 'ความสอดคล้องกับกฎระเบียบและกฎหมาย', desc: 'AI มีการขึ้นทะเบียน อนุมัติ และใช้ข้อมูลถูกกฎหมาย PDPA/เครื่องมือแพทย์ หรือไม่', isCritical: true, options: [{ score: 2, label: 'ดีมาก', detail: '• มีสถานะ อย./SaMD ประเทศไทยชัดเจน\n• ฐานอ้างอิง PDPA ถูกต้องและปลอดภัย\n• ระบุเงื่อนไขและวัตถุประสงค์ชัดเจน' }, { score: 1, label: 'พอใช้', detail: '• มีเอกสารกฎหมายบางส่วน\n• อยู่ระหว่างขออนุมัติเพิ่มเติมเพื่อใช้งานจริง' }, { score: 0, label: 'เสี่ยงสูง (Critical Stop)', detail: '• ไม่มีหลักฐานการรับรองทางกฎหมาย\n• เสี่ยงผิดกฎหมายคุ้มครองข้อมูลส่วนบุคคล (PDPA)' }] },
              { id: 'R2', title: 'สิทธิข้อมูล ความเป็นส่วนตัว และความสมบูรณ์', desc: 'มีการกำหนดสิทธิ์ข้อมูล DPA, DPIA และการทำ Pseudonymization ชัดเจนหรือไม่', isCritical: true, options: [{ score: 2, label: 'ดีมาก', detail: '• มีสัญญาประมวลผลข้อมูล (DPA) ชัดเจน\n• ทำรายงานประเมินผลกระทบ (DPIA) ครบถ้วน\n• มีมาตรการทำข้อมูลนิรนามก่อนจัดส่ง' }, { score: 1, label: 'พอใช้', detail: '• มีมาตรการคุ้มครองพื้นฐาน\n• นโยบายลบข้อมูลหรือคืนสิทธิ์ยังไม่ครบถ้วน' }, { score: 0, label: 'เสี่ยงสูง (Critical Stop)', detail: '• สัญญาให้สิทธิ์ผู้ขายนำข้อมูลผู้ป่วยไปใช้อย่างหละหลวม\n• ไม่มีมาตรการป้องกันข้อมูลรั่วไหล' }] },
              { id: 'R3', title: 'ความมั่นคงปลอดภัยไซเบอร์และแผนตอบสนอง', desc: 'มีมาตรการป้องกัน (เข้ารหัส/MFA), ตรวจจับ (Pen Test) และรับมือการโจมตี (Incident Response) หรือไม่', isCritical: true, options: [{ score: 2, label: 'ดีมาก', detail: '• เข้ารหัสข้อมูลครบถ้วน (At rest & In transit)\n• มี Access control / MFA / Audit log ตรวจสอบได้\n• มีรายงาน Pen test ล่าสุดไม่เกิน 12 เดือน\n• มี Incident response plan พร้อมกู้คืน' }, { score: 1, label: 'พอใช้', detail: '• มีมาตรการพื้นฐาน\n• รายงานทดสอบช่องโหว่ไม่เป็นปัจจุบัน\n• มีแผนรับมือแต่ยังไม่เคยผ่านการทดสอบจริง' }, { score: 0, label: 'เสี่ยงสูง (Critical Stop)', detail: '• ไม่เข้ารหัสข้อมูลสุขภาพ\n• ไม่มีระบบควบคุมการเข้าถึงหรือบันทึก Audit log' }] },
              { id: 'R4', title: 'การตรวจสอบย้อนหลัง ความรับผิดชอบ และธรรมาภิบาล', desc: 'ตรวจสอบได้ว่าใครตัดสินใจ และมี RACI ระบุว่าใครรับผิดชอบเมื่อเกิดข้อผิดพลาดหรือไม่', options: [{ score: 2, label: 'ดีมาก', detail: '• มี Audit trail บันทึกกิจกรรมครบถ้วน\n• มี RACI matrix กำหนดความรับผิดชอบชัดเจน\n• ผ่านคณะกรรมการ AI Governance\n• มี Exit strategy หากยกเลิกสัญญา' }, { score: 1, label: 'พอใช้', detail: '• มีบันทึกการใช้งานพื้นฐาน\n• ขอบเขตรับผิดชอบเชิงกฎหมายยังต้องปรับปรุง\n• ยังไม่ผ่านคณะกรรมการกลาง' }, { score: 0, label: 'เสี่ยงสูง', detail: '• ไม่สามารถตรวจสอบการตัดสินใจย้อนหลังได้\n• ไม่มีมาตรการรองรับความเสียหายเชิงคลินิก' }] }
            ]
          },
          {
            id: 'E', name: 'Ethics, Equity & Trust', title: 'จริยธรรม ความเสมอภาค และความน่าเชื่อถือ', icon: 'scale',

          { term: 'Data integrity', desc: 'ความครบถ้วน ถูกต้อง ไม่ถูกแก้ไขโดยไม่ได้รับอนุญาต และตรวจสอบแหล่งที่มาของข้อมูลได้' },
          { term: 'Data ownership', desc: 'สิทธิและอำนาจในการควบคุมข้อมูล ต้องแยกให้ชัดระหว่างสิทธิของผู้ป่วย สิทธิของโรงพยาบาล และสิทธิของผู้ขาย' },
          { term: 'De-identification', desc: 'การลดหรือลบข้อมูลที่ระบุตัวบุคคลออก เพื่อลดความเสี่ยงการระบุตัวผู้ป่วย' },
          { term: 'DICOM', desc: 'มาตรฐานไฟล์และการสื่อสารสำหรับภาพทางการแพทย์ เช่น X-ray, CT, MRI และ ultrasound' },
          { term: 'DPA', desc: 'ข้อตกลงระหว่างผู้ควบคุมข้อมูลและผู้ประมวลผลข้อมูล เพื่อกำหนดหน้าที่ ขอบเขต และมาตรการคุ้มครองข้อมูล' },
          { term: 'DPIA', desc: 'การประเมินผลกระทบด้านการคุ้มครองข้อมูลส่วนบุคคล โดยเฉพาะโครงการที่ใช้ข้อมูลสุขภาพหรือข้อมูลอ่อนไหวจำนวนมาก' },
          { term: 'DR Plan', desc: 'แผนกู้คืนระบบเมื่อเกิดเหตุร้ายแรง เช่น ระบบล่ม ข้อมูลเสียหาย ไฟไหม้ หรือถูกโจมตีไซเบอร์' },
          { term: 'EMR / EHR', desc: 'เวชระเบียนอิเล็กทรอนิกส์ของผู้ป่วย ใช้เก็บข้อมูลการรักษา ประวัติ ตรวจร่างกาย ผลการตรวจทางห้องปฏิบัติการ และคำสั่งรักษา' },
          { term: 'Encryption', desc: 'การเข้ารหัสข้อมูลเพื่อให้ผู้ที่ไม่มีสิทธิ์ไม่สามารถอ่านข้อมูลได้ ทั้งขณะส่งผ่านเครือข่ายและขณะจัดเก็บ' },
          { term: 'Equity', desc: 'ความเสมอภาคในการเข้าถึงประโยชน์จาก AI โดยคำนึงถึงกลุ่มเปราะบาง คนชนบท ผู้สูงอายุ ผู้พิการ หรือผู้มีข้อจำกัดด้านทรัพยากร' },
          { term: 'Exit strategy', desc: 'แผนเมื่อเลิกใช้หรือเปลี่ยนผู้ขาย เช่น การส่งคืน/ลบข้อมูล การส่งออกข้อมูล และความต่อเนื่องของบริการ' },
          { term: 'Explainability', desc: 'ความสามารถของ AI ในการอธิบายเหตุผลหรือหลักฐานประกอบผลลัพธ์ เพื่อให้ผู้ใช้เข้าใจและตรวจสอบได้' },
          { term: 'External validation', desc: 'การทดสอบ AI กับข้อมูลจากแหล่งอื่นนอกเหนือจากข้อมูลที่ใช้พัฒนาโมเดล เพื่อลดความเสี่ยงว่า AI เก่งเฉพาะชุดข้อมูลเดิม' },
          { term: 'Fairness', desc: 'ความเป็นธรรมของ AI คือไม่ทำให้ผู้ป่วยบางกลุ่มได้ผลลัพธ์ด้อยกว่าโดยไม่มีเหตุผลอันสมควร' },
          { term: 'False negative', desc: 'AI แจ้งว่าปกติหรือไม่มีโรค ทั้งที่ความจริงมีโรค อาจทำให้วินิจฉัยล่าช้าหรือพลาดการรักษาที่จำเป็น' },
          { term: 'False positive', desc: 'AI แจ้งว่าผิดปกติหรือมีโรค ทั้งที่ความจริงไม่มีโรค อาจทำให้ตรวจเพิ่ม รักษาเกินจำเป็น หรือเกิดความกังวล' },
          { term: 'FHIR', desc: 'มาตรฐานข้อมูลสุขภาพรุ่นใหม่ที่ช่วยให้ระบบต่าง ๆ เชื่อมต่อและแลกเปลี่ยนข้อมูลได้ง่ายขึ้น' },
          { term: 'Generalizability', desc: 'ความสามารถของ AI ในการทำงานได้ดีเมื่อใช้กับประชากร สถานที่ เครื่องมือ หรือช่วงเวลาที่ต่างจากข้อมูลที่ใช้พัฒนา' },
          { term: 'Health literacy', desc: 'ความสามารถของผู้ป่วยหรือประชาชนในการเข้าใจข้อมูลสุขภาพ จึงควรใช้คำอธิบาย AI ที่ไม่ซับซ้อนเกินไป' },
          { term: 'Heatmap', desc: 'ภาพหรือสีที่แสดงตำแหน่งหรือบริเวณที่ AI ให้ความสำคัญ เช่น จุดบนภาพ X-ray ที่ทำให้ AI สงสัยโรค' },
          { term: 'HIS', desc: 'ระบบสารสนเทศหลักของโรงพยาบาลที่ใช้บริหารข้อมูลบริการ เช่น เวชระเบียน นัดหมาย คำสั่งยา และการเงิน' },
          { term: 'HL7', desc: 'มาตรฐานแลกเปลี่ยนข้อมูลสุขภาพระหว่างระบบ เช่น ข้อมูลผู้ป่วย คำสั่งตรวจ และผลตรวจ' },
          { term: 'Human-in-the-loop', desc: 'การมีมนุษย์กำกับ ตรวจสอบ หรืออนุมัติการตัดสินใจสำคัญของ AI โดยเฉพาะงานที่กระทบการวินิจฉัยหรือการรักษา' },
          { term: 'Incident response plan', desc: 'แผนตอบสนองเมื่อเกิดเหตุ เช่น ข้อมูลรั่ว ระบบล่ม ผล AI ผิดพลาด หรือถูกโจมตีไซเบอร์' },
          { term: 'Informed consent', desc: 'การให้ข้อมูลอย่างเพียงพอแก่ผู้ป่วยหรือเจ้าของข้อมูลก่อนขอความยินยอม รวมถึงวัตถุประสงค์ ประโยชน์ ความเสี่ยง และทางเลือก' },
          { term: 'Intended use', desc: 'วัตถุประสงค์การใช้งานที่ผู้พัฒนาหรือโรงพยาบาลกำหนดไว้ เช่น ใช้เพื่อช่วยคัดกรอง ไม่ใช้ใช้แทนการวินิจฉัยของแพทย์' },
          { term: 'Interpretability', desc: 'ความสามารถของผู้ใช้ในการตีความผล AI ได้ถูกต้อง เช่น เข้าใจว่าคะแนน ความเสี่ยง หรือสีบนภาพหมายถึงอะไร' },
          { term: 'IRB/EC', desc: 'คณะกรรมการจริยธรรมการวิจัยในมนุษย์ ใช้พิจารณาเมื่อโครงการเข้าข่ายวิจัยหรือใช้ข้อมูล/ผู้ป่วยในลักษณะที่ต้องกำกับด้านจริยธรรม' },
          { term: 'Latency/Turnaround time', desc: 'เวลาตั้งแต่ส่งข้อมูลเข้า AI จนได้ผลลัพธ์กลับมา ต้องเหมาะกับความเร่งด่วนของงาน เช่น stroke ต้องเร็วมาก' },
          { term: 'Lawful basis', desc: 'ฐานทางกฎหมายที่อนุญาตให้เก็บ ใช้ หรือเปิดเผยข้อมูลส่วนบุคคล เช่น ความยินยอม สัญญา ประโยชน์ด้านสาธารณสุข หรือหน้าที่ตามกฎหมาย' },
          { term: 'Liability', desc: 'ความรับผิดทางกฎหมายหรือวิชาชีพเมื่อเกิดความเสียหาย เช่น ความผิดพลาดจาก AI ผู้ใช้ ระบบ หรือผู้ขาย' },
          { term: 'Local validation', desc: 'การทดสอบ AI กับข้อมูล ผู้ป่วย เครื่องมือ หรือบริบทที่ใกล้เคียงกับโรงพยาบาลที่จะใช้จริง เพื่อยืนยันว่า AI ทำงานได้จริงในบริบทนั้น' },
          { term: 'Medical AI', desc: 'AI ที่ใช้ในงานสุขภาพหรือการแพทย์ เช่น คัดกรอง วินิจฉัย ทำนายความเสี่ยง จัดลำดับคิว หรือช่วยสรุปข้อมูลเวชระเบียน' },
          { term: 'MFA (Multi-Factor Authentication)', desc: 'การยืนยันตัวตนหลายปัจจัย เช่น รหัสผ่านร่วมกับรหัส OTP หรือแอปยืนยันตัวตน' },
          { term: 'Model drift', desc: 'ภาวะที่ประสิทธิภาพ AI เปลี่ยนไปเมื่อข้อมูลจริงเปลี่ยน เช่น โรคเปลี่ยน ประชากรเปลี่ยน เครื่องมือเปลี่ยน หรือแนวทางรักษาเปลี่ยน' },
          { term: 'Model lifecycle', desc: 'วงจรชีวิตของโมเดลตั้งแต่พัฒนา ตรวจสอบ ติดตั้ง เฝ้าระวัง อัปเดต หยุดใช้ หรือเปลี่ยนเวอร์ชัน' },
          { term: 'NPV (Negative Predictive Value)', desc: 'เมื่อ AI บอกว่าผลเป็นลบ โอกาสที่ผู้ป่วยไม่มีภาวะนั้นจริงมีมากน้อยเพียงใด' },
          { term: 'Override', desc: 'ช่องทางให้ผู้ใช้ที่มีอำนาจสามารถไม่เห็นด้วย แก้ไข ยกเลิก หรือหยุดผลลัพธ์/คำแนะนำของ AI ได้อย่างปลอดภัย' },
          { term: 'PACS', desc: 'ระบบจัดเก็บและแสดงภาพทางรังสีวิทยา เช่น X-ray, CT, MRI ที่ใช้ในงานรังสีวินิจฉัย' },
          { term: 'Patient communication', desc: 'การสื่อสารกับผู้ป่วยด้วยภาษาที่เข้าใจง่ายเกี่ยวกับบทบาทของ AI ประโยชน์ ความเสี่ยง และสิทธิของผู้ป่วย' },
          { term: 'PDPA', desc: 'พระราชบัญญัติคุ้มครองข้อมูลส่วนบุคคลของไทย กำหนดหลักการเก็บ ใช้ เปิดเผย และคุ้มครองข้อมูลส่วนบุคคล' },
          { term: 'Penetration test', desc: 'การทดสอบเจาะระบบโดยผู้เชี่ยวชาญเพื่อหาช่องโหว่ก่อนใช้งานจริง' },
          { term: 'PII / PHI', desc: 'ข้อมูลที่ระบุตัวบุคคลได้หรือข้อมูลสุขภาพที่เกี่ยวข้องกับบุคคล เช่น ชื่อ เลขบัตรประชาชน HN ภาพถ่าย หรือผลตรวจ' },
          { term: 'Pilot', desc: 'การทดลองใช้ในวงจำกัด เช่น เฉพาะแผนก เฉพาะช่วงเวลา หรือเฉพาะกลุ่มผู้ป่วย เพื่อประเมินผลจริงก่อนขยายผล' },
          { term: 'Post-deployment monitoring', desc: 'การติดตามผลหลังใช้งานจริง เช่น ความแม่นยำจริง อัตราแจ้งเตือนผิดพลาด ผลกระทบต่อผู้ป่วย และปัญหาที่เกิดใน workflow' },
          { term: 'PPV (Positive Predictive Value)', desc: 'เมื่อ AI บอกว่าผลเป็นบวก โอกาสที่ผู้ป่วยมีภาวะนั้นจริงมีมากน้อยเพียงใด' },
          { term: 'Professional autonomy', desc: 'อิสระและวิจารณญาณทางวิชาชีพของบุคลากรทางการแพทย์ ไม่ถูก AI หรือระบบบริหารบังคับให้ทำตามโดยไม่มีเหตุผล' },
          { term: 'PROGRESS-Plus', desc: 'กรอบตรวจสอบปัจจัยความเหลื่อมล้ำ เช่น ถิ่นที่อยู่ เชื้อชาติ อาชีพ เพศ ศาสนา การศึกษา ฐานะทางเศรษฐกิจ ต้นทุนทางสังคม อายุ และความพิการ' },
          { term: 'Pseudonymization', desc: 'การแทนข้อมูลระบุตัวบุคคลด้วยรหัสหรือตัวแทน โดยยังอาจย้อนกลับได้ถ้ามีกุญแจหรือข้อมูลเชื่อมโยง' },
          { term: 'RACI Matrix', desc: 'ตารางแสดงบทบาทและหน้าที่ความรับผิดชอบ เพื่อกำหนดให้ชัดเจนว่าในแต่ละขั้นตอนการทำงาน "ใคร" ต้องทำหน้าที่ "อะไร"' },
          { term: 'Robustness', desc: 'ความแข็งแรงของระบบเมื่อเจอข้อมูลไม่สมบูรณ์ ภาพคุณภาพต่ำ สัญญาณรบกวน หรือสถานการณ์ที่ต่างจากชุดข้อมูลเดิม' },
          { term: 'ROI (Return on Investment)', desc: 'ผลตอบแทนจากการลงทุน เทียบประโยชน์ที่ได้กับต้นทุนที่จ่าย เช่น ลดเวลารอ ลดค่าใช้จ่าย หรือเพิ่มประสิทธิภาพ' },
          { term: 'Rollback', desc: 'กระบวนการย้อนกลับไปใช้โมเดลหรือระบบเวอร์ชันก่อนหน้าเมื่อพบความผิดปกติหรือความเสี่ยงจากเวอร์ชันใหม่' },
          { term: 'SaMD', desc: 'ซอฟต์แวร์ที่มีวัตถุประสงค์ทางการแพทย์และทำงานเป็นเครื่องมือแพทย์ได้ด้วยตัวเอง' },
          { term: 'Sandbox', desc: 'สภาพแวดล้อมจำลองหรือพื้นที่ทดลองที่แยกจากระบบบริการจริง ใช้ทดสอบ AI ก่อนเชื่อมต่อกับ workflow จริง' },
          { term: 'Sensitivity', desc: 'ความสามารถของ AI ในการตรวจพบผู้ที่มีโรคจริง ค่ายิ่งสูงยิ่งลดโอกาสพลาดผู้ป่วยที่ควรถูกตรวจพบ' },
          { term: 'SLA', desc: 'ข้อตกลงระดับการให้บริการ เช่น เวลาระบบพร้อมใช้งาน เวลาตอบสนอง และระยะเวลาซ่อมเมื่อระบบล่ม' },
          { term: 'Specificity', desc: 'ความสามารถของ AI ในการระบุผู้ที่ไม่มีโรคได้ถูกต้อง ค่ายิ่งสูงยิ่งลดโอกาสแจ้งเตือนเกินจำเป็นในคนปกติ' },
          { term: 'SSO (Single Sign-On)', desc: 'ระบบล็อกอินครั้งเดียวที่เชื่อมกับบัญชีผู้ใช้ขององค์กร ช่วยควบคุมสิทธิ์และยกเลิกสิทธิ์ได้เป็นระบบ' },
          { term: 'Subgroup analysis', desc: 'การวิเคราะห์ผลลัพธ์แยกตามกลุ่มย่อย เช่น อายุ เพศ โรคร่วม ภูมิภาค ชนิดเครื่องมือ หรือกลุ่มเปราะบาง' },
          { term: 'Target population', desc: 'กลุ่มผู้ป่วยหรือผู้รับบริการที่ AI จะนำไปใช้จริง เช่น ผู้ใหญ่ เด็ก ผู้สูงอายุ ผู้ป่วย OPD หรือผู้ป่วยฉุกเฉิน' },
          { term: 'TCO', desc: 'ต้นทุนรวมตลอดอายุการใช้งาน รวมค่าซื้อ ค่าระบบ ค่าบำรุงรักษา ค่าสมัครสมาชิก ค่าอบรม และค่าเปลี่ยนระบบ' },

        function SVGIcon({ name, className = "w-5 h-5" }) {

        function CureModelApp() {
          const [activeTab, setActiveTab] = useState('cure_info'); 
          const [expandedDims, setExpandedDims] = useState({'C': false, 'U': false, 'R': false, 'E': false});
          const [isPrintMode, setIsPrintMode] = useState(false); 
          const [showResetModal, setShowResetModal] = useState(false);
          
          const [projectInfo, setProjectInfo] = useState({
            projectName: '', vendor: '', department: '', assessor: '', assessmentDate: '', riskLevel: 'ปานกลาง'
          });
          const [scores, setScores] = useState({});
          const [docs, setDocs] = useState({});

          const [aiSummary, setAiSummary] = useState('');
          const [isGeneratingSummary, setIsGeneratingSummary] = useState(false);
          const [aiEmailDraft, setAiEmailDraft] = useState('');
          const [isGeneratingEmail, setIsGeneratingEmail] = useState(false);
          const [apiErrorMsg, setApiErrorMsg] = useState('');
          const [geminiKey, setGeminiKey] = useState('');

          const tabSequence = useMemo(() => {
            const seq = ['cure_info', 'project_info'];
            rubrics.forEach(dim => dim.questions.forEach(q => seq.push(q.id)));
            seq.push('summary', 'glossary', 'criteria', 'settings');
            return seq;
          }, []);

          const navigateTab = (direction) => {
            const currentIndex = tabSequence.indexOf(activeTab);
            if (direction === 'next' && currentIndex < tabSequence.length - 1) setActiveTab(tabSequence[currentIndex + 1]);
            if (direction === 'prev' && currentIndex > 0) setActiveTab(tabSequence[currentIndex - 1]);
            window.scrollTo(0,0);
          };

          const toggleDim = (dimId) => {
            setExpandedDims(prev => ({ ...prev, [dimId]: !prev[dimId] }));
          };

          const handleScoreChange = (qId, score) => setScores(prev => ({ ...prev, [qId]: score }));
          const handleDocChange = (docId) => setDocs(prev => ({ ...prev, [docId]: !prev[docId] }));
          const handleInfoChange = (e) => setProjectInfo(prev => ({ ...prev, [e.target.name]: e.target.value }));

          const resetAssessment = () => {
            const initScores = {};
            rubrics.forEach(r => r.questions.forEach(q => initScores[q.id] = null));
            setScores(initScores);
            const initDocs = {};
            flatDocuments.forEach(d => initDocs[d.id] = false);
            setDocs(initDocs);
            setProjectInfo({ projectName: '', vendor: '', department: '', assessor: '', assessmentDate: '', riskLevel: 'ปานกลาง' });
            setAiSummary('');
            setAiEmailDraft('');
            setApiErrorMsg('');
            setActiveTab('cure_info');
            setShowResetModal(false);
            window.scrollTo(0,0);
          };

          const generateOfflineSummary = () => {
            const { totalScore, statusText, criticalFails, missingMandatoryDocs } = evaluationResult;
            let text = `บทสรุปผู้บริหาร: โครงการประเมินความเหมาะสมของการนำระบบปัญญาประดิษฐ์ทางการแพทย์มาใช้ในสถานพยาบาล\n\n`;
            text += `จากการตรวจประเมินเทคโนโลยีปัญญาประดิษฐ์ "${projectInfo.projectName || 'ระบบจำลอง'} " พัฒนาโดย "${projectInfo.vendor || 'ผู้ผลิต/คู่ค้า'}" สำหรับติดตั้งใช้งาน ณ แผนก "${projectInfo.department || 'ไม่ระบุหน่วยงาน'}" ภายใต้เกณฑ์มาตรฐานสากล CURE Model v2 พบว่าได้รับคะแนนสุทธิ ${totalScore} คะแนน จากคะแนนเต็ม 32 คะแนน\n\n`;
            
            if (criticalFails.length > 0 || missingMandatoryDocs.length > 0) {
              text += `ความเห็นและข้อพิจารณาวิกฤต (Critical Alerts):\nโครงการนี้ "ไม่ผ่านเกณฑ์การพิจารณาด้านความปลอดภัยขั้นต่ำ" เนื่องจากพบบันทึกความบกพร่องทางกฎหมาย เทคโนโลยี หรือความเสี่ยงต่อผู้ป่วย ดังนี้:\n`;
              if (criticalFails.length > 0) text += `- มีข้อประเมินที่ระดับวิกฤต (Critical Questions) ได้รับ 0 คะแนน ในประเด็น: ${criticalFails.join(', ')}\n`;
              if (missingMandatoryDocs.length > 0) text += `- ขาดเอกสารรับรองภาคบังคับ: ${missingMandatoryDocs.join(', ')}\n`;
              text += `\nมติที่ประชุม:\nมีมติส่งคืนแบบคำขอเพื่อส่งเรื่องกลับไปยังผู้ขาย ให้ทำการจัดส่งเอกสารและปรับปรุงระบบการทำงานในประเด็นวิกฤตข้างต้นให้สมบูรณ์ ก่อนนำกลับมาเสนอต่อคณะอนุกรรมการเพื่อพิจารณาใหม่อีกครั้ง`;
            } else {
              if (totalScore >= 26) text += `มติที่ประชุมและแนวทางดำเนินการ (Ready to Deploy):\nโครงการผ่านเกณฑ์การประเมินในระดับดีเยี่ยม ไม่มีเงื่อนไขขัดข้องด้านกฎหมายและความปลอดภัย ไซเบอร์ อนุมัติเห็นควรให้นำระบบจัดซื้อจัดจ้างตามขั้นตอนและเปิดเชื่อมเข้าสู่เครือข่าย HIS ของโรงพยาบาลได้โดยทันที โดยให้มีแผนการตรวจสอบคุณภาพแบบจำลอง (Model drift) ตามกำหนดการทุกๆ 6 เดือน`;
              else if (totalScore >= 17) text += `มติที่ประชุมและแนวทางดำเนินการ (Sandbox Pilot):\nโครงการได้รับการประเมินความพร้อมในระดับปานกลาง มีคุณค่าและคุณประโยชน์ทางคลินิกแต่อาจต้องปรับปรุงคู่มือการอบรมเพิ่มเติม คณะกรรมการมีมติเห็นสมควร "อนุมัติให้นำร่องทดลองใช้งานจำกัดวง (Sandbox)" เป็นระยะเวลา 3-6 เดือน โดยติดตั้งระบบแจ้งเตือนและวัดตัวชี้วัดผลลัพธ์ (KPI) อย่างเข้มงวดก่อนพิจารณาอนุมัติใช้จริงถัดไป`;
              else text += `มติที่ประชุมและแนวทางดำเนินการ (Rejected):\nโครงการได้คะแนนรวมต่ำกว่าเกณฑ์ขั้นต่ำ (น้อยกว่า 17 คะแนน) ขาดความพร้อมของคู่มือและการออกแบบเวิร์กโฟลว์ใช้งาน มีมติ "ไม่อนุมัติโครงการ" เพื่อความปลอดภัยของข้อมูลสุขภาพและวิชาชีพ`;
            }
            return text;
          };

          const generateOfflineEmail = () => {
            const { missingDocs } = evaluationResult;
            let text = `เรื่อง: ขอความอนุเคราะห์จัดส่งเอกสารรับรองมาตรฐานเพิ่มเติมประกอบการพิจารณาประเมินเทคโนโลยี AI\n`;
            text += `เรียน: ฝ่ายประสานงานจัดซื้อ บริษัท ${projectInfo.vendor || '(ชื่อบริษัทคู่ค้า)'}\n\n`;
            text += `ตามที่โรงพยาบาลได้ดำเนินการพิจารณาประเมินความพร้อมเชิงเทคนิคและคลินิก สำหรับโครงการปัญญาประดิษฐ์ทางการแพทย์ "${projectInfo.projectName || 'ระบบจำลอง'}" ตามมาตรฐาน CURE Model v2 ของโรงพยาบาลนั้น\n\n`;
            text += `คณะทำงานฯ ตรวจสอบพบบันทึกความบกพร่องของเอกสารแนบสำคัญ ใคร่ขอความร่วมมือจากทางคู่ค้าจัดส่งเอกสารรับรองความถูกต้องเพิ่มเติมดังรายการดังต่อไปนี้:\n\n`;
            missingDocs.slice(0, 8).forEach((d, idx) => { text += `${idx + 1}. ${d}\n`; });
            if (missingDocs.length > 8) text += `...และเอกสารข้อกำหนดความพร้อมด้าน IT, ความปลอดภัยไซเบอร์ อื่นๆ รวมทั้งสิ้น ${missingDocs.length} ฉบับ\n`;
            text += `\nจึงเรียนมาเพื่อโปรดพิจารณาและดำเนินการจัดส่งเอกสารดังกล่าวกลับมายังคณะอนุกรรมการฯ เพื่อสแกนนำเสนอผู้อำนวยการอนุมัติสัญญาในขั้นตอนถัดไป\n\nขอแสดงความนับถือ\nคณะทำงานประเมินความปลอดภัยปัญญาประดิษฐ์ทางการแพทย์`;
            return text;
          };

          const callGemini = async (prompt) => {
            setApiErrorMsg('');
            const key = geminiKey.trim();
            // อัปเดตโมเดลเป็น gemini-3.5-flash ตามคำขอ
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${key}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };
            try {
              const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              if (!res.ok) {
                 const errText = await res.text();
                 throw new Error(`HTTP Error ${res.status}: ${errText}`);
              }
              const data = await res.json();
              return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
            } catch (err) {
              setApiErrorMsg(`⚠️ เกิดข้อผิดพลาดในการดึงข้อมูล AI: ${err.message}`);
              throw err;
            }
          };

          const handleGenerateEmail = async () => {
            const { missingDocs } = evaluationResult;
            if (missingDocs.length === 0) { setAiEmailDraft("เอกสารแนบครบถ้วนดีแล้ว ไม่จำเป็นต้องทำแบบคำร้องขอเอกสารเพิ่มเติมครับ"); return; }
            setIsGeneratingEmail(true);
            if (!geminiKey.trim()) { setTimeout(() => { setAiEmailDraft(generateOfflineEmail()); setIsGeneratingEmail(false); }, 600); return; }
            const prompt = `คุณคือเจ้าหน้าที่ประเมินโครงการ AI ของโรงพยาบาล ช่วยร่างอีเมลภาษาไทยแบบเป็นทางการและสุภาพ เพื่อขอเอกสารเพิ่มเติมจากบริษัทผู้พัฒนา/ผู้ขาย (${projectInfo.vendor || 'ระบุชื่อบริษัท'}) สำหรับโครงการ "${projectInfo.projectName || 'ไม่ระบุชื่อโครงการ'}" โดยรายการเอกสารที่ขาดและจำเป็นต้องใช้ประกอบการพิจารณามีดังนี้:\n\n${missingDocs.map(d => "- " + d).join('\n')}\n\nขอให้เขียนเป็นอีเมลที่พร้อมคัดลอกไปส่งได้เลย มีคำขึ้นต้นและคำลงท้ายที่เหมาะสม`;
            try { const result = await callGemini(prompt); setAiEmailDraft(result || generateOfflineEmail()); } catch (error) { setAiEmailDraft(generateOfflineEmail()); }
            setIsGeneratingEmail(false);
          };

          const handleGenerateSummary = async () => {
            setIsGeneratingSummary(true);
            if (!geminiKey.trim()) { setTimeout(() => { setAiSummary(generateOfflineSummary()); setIsGeneratingSummary(false); }, 700); return; }
            const { totalScore, statusText, criticalFails, missingMandatoryDocs } = evaluationResult;

                <div className="max-w-4xl mx-auto p-12 bg-white pt-24 print:pt-0 print:p-0">
                  <div className="text-center mb-8 border-b-2 border-double border-gray-400 pb-4"><h1 className="text-2xl font-bold text-gray-900 leading-normal">ใบสรุปผลการประเมิน CURE Model v2</h1><p className="text-gray-600 text-sm mt-1">เกณฑ์มาตรฐานการรับรองความเหมาะสมปัญญาประดิษฐ์ทางการแพทย์สำหรับโรงพยาบาล</p></div>
                  <div className="border border-gray-400 p-6 rounded-lg mb-6 break-inside-avoid print:shadow-none"><h2 className="text-base font-bold text-gray-800 border-b border-gray-300 pb-2 mb-4 bg-gray-100 -mx-6 px-6 -mt-6 rounded-t-lg">ข้อมูลโครงการ</h2><table className="w-full text-sm leading-relaxed text-left border-collapse"><tbody><tr><td className="py-2 w-1/2"><span className="text-gray-600 mr-2">ชื่อโครงการ:</span> <span className="font-bold">{projectInfo.projectName || '-'}</span></td><td className="py-2 w-1/2"><span className="text-gray-600 mr-2">ผู้ขาย/Vendor:</span> <span className="font-bold">{projectInfo.vendor || '-'}</span></td></tr><tr><td className="py-2 w-1/2"><span className="text-gray-600 mr-2">หน่วยงานที่ใช้งาน:</span> <span className="font-bold">{projectInfo.department || '-'}</span></td><td className="py-2 w-1/2"><span className="text-gray-600 mr-2">ระดับความเสี่ยงทางคลินิก:</span> <span className="font-bold">{projectInfo.riskLevel}</span></td></tr><tr><td className="py-2 w-1/2"><span className="text-gray-600 mr-2">ผู้ประเมิน:</span> <span className="font-bold">{projectInfo.assessor || '-'}</span></td><td className="py-2 w-1/2"><span className="text-gray-600 mr-2">วันที่ประเมิน:</span> <span className="font-bold">{projectInfo.assessmentDate ? new Date(projectInfo.assessmentDate).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }) : '-'}</span></td></tr></tbody></table></div>
                  <div className="grid grid-cols-2 gap-6 mb-6"><div className="border border-gray-400 p-6 rounded-lg break-inside-avoid print:shadow-none"><h2 className="text-base font-bold text-gray-800 mb-3 border-b border-gray-300 pb-1">ดัชนีคะแนนรายมิติ</h2><div className="space-y-2 text-sm">{rubrics.map(r => (<div key={r.id} className="flex justify-between items-center border-b border-gray-200 pb-1"><span className="text-gray-700">มิติที่ {r.id}: {r.name}</span><span className="font-bold">{r.questions.reduce((acc, q) => acc + (scores[q.id] || 0), 0)} / 8</span></div>))}<div className="flex justify-between items-center pt-2 font-bold text-base mt-2"><span>รวมคะแนนสุทธิ</span><span className="text-lg">{totalScore} / 32</span></div></div></div><div className="border border-gray-400 p-6 rounded-lg break-inside-avoid print:shadow-none"><h2 className="text-base font-bold text-gray-800 mb-3 border-b border-gray-300 pb-1">มาตรการสแกนความปลอดภัย</h2>{hasCriticalStop ? (<div className="text-red-700"><div className="font-bold mb-2 text-sm">⚠ พบจุดขัดข้อง (Critical Stop)</div><ul className="list-disc pl-5 text-[13px] space-y-1">{criticalFails.map((f, i) => <li key={i}>ประเมินตกหัวข้อบังคับ: {f}</li>)}{missingMandatoryDocs.map((d, i) => <li key={i}>{d}</li>)}</ul></div>) : (<div className="text-green-700 flex flex-col items-center justify-center h-28 text-center"><svg className="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg><p className="font-bold text-sm">ผ่านเกณฑ์ความปลอดภัยสูงสุด</p></div>)}</div></div>
                  <div className={`p-4 rounded-lg border-2 ${statusColor} text-center mb-6 break-inside-avoid print:shadow-none print:border-gray-500 print:text-black print:bg-white`}><p className="text-xs font-bold uppercase mb-0.5">ผลสรุปมติการพิจารณาตัดสินใจ</p><p className="text-xl font-bold">{statusText}</p></div>
                  <div className="border border-gray-400 p-6 rounded-lg mb-8 break-inside-avoid print:shadow-none"><h2 className="text-base font-bold text-gray-900 mb-3 border-b border-gray-300 pb-1">บทสรุปผู้บริหารและข้อเสนอแนะ (Executive Summary)</h2><div className="text-gray-800 text-[14px] leading-loose whitespace-pre-line text-left text-justify">{aiSummary || <span className="italic text-gray-400">ไม่ได้สร้างข้อความจำลองสรุปผู้บริหารผ่านระบบ AI</span>}</div></div>
                  <div className="pt-6 border-t-2 border-gray-400 break-inside-avoid mt-12"><p className="font-bold text-sm mb-6 text-left">ลายมือชื่อและบันทึกความเห็นชอบคณะกรรมการประเมิน:</p><div className="flex justify-start gap-8 mb-16 text-sm"><label className="flex items-center gap-2"><div className="w-4 h-4 border border-black rounded-sm"></div> อนุมัติจัดซื้อ/จัดจ้าง</label><label className="flex items-center gap-2"><div className="w-4 h-4 border border-black rounded-sm"></div> เห็นชอบนำร่อง (Sandbox)</label><label className="flex items-center gap-2"><div className="w-4 h-4 border border-black rounded-sm"></div> ไม่อนุมัติสัญญา</label></div><div className="grid grid-cols-2 gap-x-12 gap-y-16 text-center mt-6"><div className="pb-4"><div className="border-b border-black w-3/4 mx-auto mb-2 h-8"></div><p className="text-xs font-bold text-gray-800">ผู้รับผิดชอบหลักทางคลินิก (Clinical Owner)</p></div><div className="pb-4"><div className="border-b border-black w-3/4 mx-auto mb-2 h-8"></div><p className="text-xs font-bold text-gray-800">หัวหน้าฝ่ายเทคโนโลยีสารสนเทศ (IT Department)</p></div><div className="pb-4"><div className="border-b border-black w-3/4 mx-auto mb-2 h-8"></div><p className="text-xs font-bold text-gray-800">ผู้แทนฝ่ายกฎหมาย / DPO</p></div><div className="pb-4"><div className="border-b border-black w-3/4 mx-auto mb-2 h-8"></div><p className="text-xs font-bold text-gray-800">ผู้อำนวยการ / ผู้บริหารระดับสูงของโรงพยาบาล</p></div></div></div>
                </div>
                <style dangerouslySetInnerHTML={{__html: `@media print { body * { visibility: hidden !important; } .print-wrapper, .print-wrapper * { visibility: visible !important; } html, body { height: auto !important; overflow: visible !important; position: static !important; display: block !important; background: white !important; color: black !important; } .print-wrapper { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; height: auto !important; box-shadow: none !important; } .print\\:hidden { display: none !important; } @page { size: A4 portrait; margin: 15mm; } .break-inside-avoid { page-break-inside: avoid; break-inside: avoid; } }`}} />
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gray-50 flex font-sans">
              {renderSidebar()}
              <div className="flex-1 p-4 md:p-8 overflow-y-auto relative">
                <div className="max-w-4xl mx-auto">
                  {renderMainContent()}
                </div>
              </div>
              
              {/* Reset Modal */}
              {showResetModal && (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center animate-fadeIn">
                  <div className="bg-white p-6 rounded-xl max-w-sm w-full mx-4 shadow-2xl">
                    <h3 className="text-lg font-bold text-gray-900 mb-2 flex items-center gap-2"><svg className="w-6 h-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>ยืนยันการเริ่มใหม่</h3>
                    <p className="text-sm text-gray-600 mb-6">คุณแน่ใจหรือไม่ว่าต้องการล้างข้อมูลการประเมิน คะแนน และเอกสารทั้งหมดเพื่อเริ่มต้นใหม่? (การกระทำนี้ไม่สามารถย้อนกลับได้)</p>
                    <div className="flex justify-end gap-3">
                      <button onClick={() => setShowResetModal(false)} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm font-medium transition">ยกเลิก</button>
                      <button onClick={resetAssessment} className="px-4 py-2 bg-red-600 text-white hover:bg-red-700 rounded-lg text-sm font-bold transition shadow-sm">ยืนยันล้างข้อมูล</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CureModelApp />);
    </script>
</body>
</html>
