            } else {
              if (totalScore >= 26) {
                text += `มติที่ประชุมและแนวทางดำเนินการ (Ready to Deploy):\nโครงการผ่านเกณฑ์การประเมินในระดับดีเยี่ยม ไม่มีเงื่อนไขขัดข้องด้านกฎหมายและความปลอดภัย ไซเบอร์ อนุมัติเห็นควรให้นำระบบจัดซื้อจัดจ้างตามขั้นตอนและเปิดเชื่อมเข้าสู่เครือข่าย HIS ของโรงพยาบาลได้โดยทันที โดยให้มีแผนการตรวจสอบคุณภาพแบบจำลอง (Model drift) ตามกำหนดการทุกๆ 6 เดือน`;
              } else if (totalScore >= 17) {
                text += `มติที่ประชุมและแนวทางดำเนินการ (Sandbox Pilot):\nโครงการได้รับการประเมินความพร้อมในระดับปานกลาง มีคุณค่าและคุณประโยชน์ทางคลินิกแต่อาจต้องปรับปรุงคู่มือการอบรมเพิ่มเติม คณะกรรมการมีมติเห็นสมควร "อนุมัติให้นำร่องทดลองใช้งานจำกัดวง (Sandbox)" เป็นระยะเวลา 3-6 เดือน โดยติดตั้งระบบแจ้งเตือนและวัดตัวชี้วัดผลลัพธ์ (KPI) อย่างเข้มงวดก่อนพิจารณาอนุมัติใช้จริงถัดไป`;
              } else {
                text += `มติที่ประชุมและแนวทางดำเนินการ (Rejected):\nโครงการได้คะแนนรวมต่ำกว่าเกณฑ์ขั้นต่ำ (น้อยกว่า 17 คะแนน) ขาดความพร้อมของคู่มือและการออกแบบเวิร์กโฟลว์ใช้งาน มีมติ "ไม่อนุมัติโครงการ" เพื่อความปลอดภัยของข้อมูลสุขภาพและวิชาชีพ`;
              }
            }
            return text;
          };

          const generateOfflineEmail = () => {
            const missingDocs = [];
            documentChecklist.forEach(cat => cat.items.forEach(item => { if (!docs[item.id]) missingDocs.push(item.text); }));
            
            let text = `เรื่อง: ขอความอนุเคราะห์จัดส่งเอกสารรับรองมาตรฐานเพิ่มเติมประกอบการพิจารณาประเมินเทคโนโลยี AI\n`;
            text += `เรียน: ฝ่ายประสานงานจัดซื้อ บริษัท ${projectInfo.vendor || '(ชื่อบริษัทคู่ค้า)'}\n\n`;
            text += `ตามที่โรงพยาบาลได้ดำเนินการพิจารณาประเมินความพร้อมเชิงเทคนิคและคลินิก สำหรับโครงการปัญญาประดิษฐ์ทางการแพทย์ "${projectInfo.projectName || 'ระบบจำลอง'}" ตามมาตรฐาน CURE Model v2 ของโรงพยาบาลนั้น\n\n`;
            text += `คณะทำงานฯ ตรวจสอบพบบันทึกความบกพร่องของเอกสารแนบสำคัญ ใคร่ขอความร่วมมือจากทางคู่ค้าจัดส่งเอกสารรับรองความถูกต้องเพิ่มเติมดังรายการดังต่อไปนี้:\n\n`;
            
            missingDocs.slice(0, 8).forEach((d, idx) => {
              text += `${idx + 1}. ${d}\n`;
            });
            if (missingDocs.length > 8) {
              text += `...และเอกสารข้อกำหนดความพร้อมด้าน IT, ความปลอดภัยไซเบอร์ อื่นๆ รวมทั้งสิ้น ${missingDocs.length} ฉบับ\n`;
            }
            
            text += `\nจึงเรียนมาเพื่อโปรดพิจารณาและดำเนินการจัดส่งเอกสารดังกล่าวกลับมายังคณะอนุกรรมการฯ เพื่อสแกนนำเสนอผู้อำนวยการอนุมัติสัญญาในขั้นตอนถัดไป\n\n`;
            text += `ขอแสดงความนับถือ\nคณะทำงานประเมินความปลอดภัยปัญญาประดิษฐ์ทางการแพทย์\nฝ่ายสารสนเทศและเทคโนโลยีทางการแพทย์`;
            return text;
          };

          const callGemini = async (prompt) => {
            const key = geminiKey.trim();
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };
            const delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i < 6; i++) {
              try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
              } catch (err) {
                if (i === 5) throw err;
                await new Promise(resolve => setTimeout(resolve, delays[i]));
              }
            }
          };

          const handleGenerateEmail = async () => {
            setIsGeneratingEmail(true);
            if (!geminiKey.trim()) {
              setTimeout(() => {
                setAiEmailDraft(generateOfflineEmail());
                setIsGeneratingEmail(false);
              }, 600);
              return;
            }

            const missingDocs = [];
            documentChecklist.forEach(cat => cat.items.forEach(item => { if (!docs[item.id]) missingDocs.push(item.text); }));
            if (missingDocs.length === 0) { setAiEmailDraft("เอกสารแนบครบถ้วนดีแล้ว ไม่จำเป็นต้องทำแบบคำร้องขอเอกสารเพิ่มเติมครับ"); setIsGeneratingEmail(false); return; }

            const prompt = `คุณคือเจ้าหน้าที่ประเมินโครงการ AI ของโรงพยาบาล ช่วยร่างอีเมลภาษาไทยแบบเป็นทางการและสุภาพ เพื่อขอเอกสารเพิ่มเติมจากบริษัทผู้พัฒนา/ผู้ขาย (${projectInfo.vendor || 'ระบุชื่อบริษัท'}) สำหรับโครงการ "${projectInfo.projectName || 'ไม่ระบุชื่อโครงการ'}" โดยรายการเอกสารที่ขาดและจำเป็นต้องใช้ประกอบการพิจารณามีดังนี้:\n\n${missingDocs.map(d => "- " + d).join('\n')}\n\nขอให้เขียนเป็นอีเมลที่พร้อมคัดลอกไปส่งได้เลย มีคำขึ้นต้นและคำลงท้ายที่เหมาะสม`;
            try {
              const result = await callGemini(prompt);
              setAiEmailDraft(result || generateOfflineEmail());
            } catch (error) { 
              setAiEmailDraft(generateOfflineEmail()); 
            }
            setIsGeneratingEmail(false);
          };

          const handleGenerateSummary = async () => {
            setIsGeneratingSummary(true);
            if (!geminiKey.trim()) {
              setTimeout(() => {
                setAiSummary(generateOfflineSummary());
                setIsGeneratingSummary(false);
              }, 700);
              return;
            }

            const { totalScore, statusText, criticalFails, missingMandatoryDocs } = evaluationResult;
            let prompt = `คุณคือผู้เชี่ยวชาญด้านปัญญาประดิษฐ์ทางการแพทย์ ช่วยเขียนบทสรุปผู้บริหาร (Executive Summary) สั้นๆ 1-2 ย่อหน้า เป็นภาษาไทยทางการ เพื่อรายงานให้ผู้อำนวยการโรงพยาบาลทราบถึงผลการประเมินเบื้องต้น\n\nข้อมูลโครงการ:\n- ชื่อโครงการ: ${projectInfo.projectName || 'ไม่ระบุ'}\n- บริษัทผู้พัฒนา: ${projectInfo.vendor || 'ไม่ระบุ'}\n- ระดับความเสี่ยงคลินิก: ${projectInfo.riskLevel}\n- คะแนนรวม CURE Model: ${totalScore}/32\n- ข้อเสนอแนะเบื้องต้น: ${statusText}\n`;
            if (criticalFails.length > 0 || missingMandatoryDocs.length > 0) {
              prompt += `\nพบความเสี่ยงสำคัญ (Critical Stop) ที่ต้องระบุในสรุปด้วย:\n${criticalFails.join('\n')}\n${missingMandatoryDocs.join('\n')}`;
            } else { prompt += `\nไม่พบความเสี่ยงสำคัญ (Critical Stop) เอกสารและมาตรฐานอยู่ในเกณฑ์ที่รับได้`; }
            
            try {
              const result = await callGemini(prompt);
              setAiSummary(result || generateOfflineSummary());
            } catch (error) { 
              setAiSummary(generateOfflineSummary()); 
            }
            setIsGeneratingSummary(false);
          };

          useEffect(() => {
            if (isPrintMode) {
              const timer = setTimeout(() => {
                try {
                  window.print();
                } catch (e) {
                  console.error("เบราว์เซอร์หรือ Sandbox บล็อกป๊อปอัปพิมพ์อัตโนมัติ ผู้ใช้สามารถกด Ctrl+P หรือ Cmd+P ได้โดยตรง", e);
                }
              }, 700); 
              return () => clearTimeout(timer);
            }
          }, [isPrintMode]);

          const evaluationResult = useMemo(() => {
            let totalScore = 0; let answeredQuestions = 0;
            const criticalFails = []; const missingMandatoryDocs = [];

            rubrics.forEach(dim => dim.questions.forEach(q => {
              if (scores[q.id] !== null) {
                totalScore += scores[q.id]; answeredQuestions++;
                if (q.isCritical && scores[q.id] === 0) criticalFails.push(`${q.id} (ได้ 0 คะแนน)`);
              }
            }));

            documentChecklist.forEach(cat => cat.items.forEach(item => {
              if (item.type === 'mandatory' && !docs[item.id]) missingMandatoryDocs.push(`ขาดเอกสารบังคับในหมวด ${item.ref}`);
            }));

            const hasCriticalStop = criticalFails.length > 0 || missingMandatoryDocs.length > 0;
            const isComplete = answeredQuestions === 16;
            let status = 'INCOMPLETE'; let statusText = 'กรุณากรอกข้อมูลประเมินให้ครบถ้วน'; let statusColor = 'bg-gray-100 text-gray-800';

            if (isComplete) {
              if (hasCriticalStop) { status = 'REJECT'; statusText = 'ไม่อนุมัติโครงการ / ติดเงื่อนไข Critical Stop'; statusColor = 'bg-red-100 text-red-800 border-red-300'; }
              else if (totalScore >= 26) { status = 'READY'; statusText = 'พร้อมดำเนินการ (Ready for Implementation)'; statusColor = 'bg-green-100 text-green-800 border-green-300'; }
              else if (totalScore >= 17) { status = 'PILOT'; statusText = 'ควรดำเนินการนำร่อง/ทดสอบ (Pilot / Sandbox)'; statusColor = 'bg-yellow-100 text-yellow-800 border-yellow-300'; }
              else { status = 'NOT_READY'; statusText = 'ไม่พร้อมดำเนินการ (Not Ready / High Risk)'; statusColor = 'bg-red-100 text-red-800 border-red-300'; }
            }
            return { totalScore, hasCriticalStop, criticalFails, missingMandatoryDocs, isComplete, status, statusText, statusColor };
          }, [scores, docs]);

          const tabs = [
            { id: 'info', label: 'ข้อมูลทั่วไป' },
            ...rubrics.map(r => ({ id: r.id, label: r.id + ': ' + r.name })),
            { id: 'docs', label: 'รายการเอกสาร' },
            { id: 'summary', label: 'สรุปผล' },
            { id: 'settings', label: 'ตั้งค่า AI API' }
          ];

          // ============================================================================
          // RENDER: PRINT MODE (แบบฟอร์มสกรีนขาว A4 คมชัดสูงสุด Vector-based)
          // ============================================================================
          if (isPrintMode) {
            const { totalScore, hasCriticalStop, criticalFails, missingMandatoryDocs, statusText, statusColor } = evaluationResult;
            
            return (
              <div className="bg-white min-h-screen text-black print-wrapper font-sarabun">
                {/* Control bar */}
                <div className="bg-indigo-600 text-white p-4 flex justify-between items-center shadow-md fixed top-0 left-0 w-full z-50 print:hidden">
                  <div className="flex items-center gap-3">
                    <button onClick={() => setIsPrintMode(false)} className="bg-white/20 hover:bg-white/30 p-2 rounded-full transition flex items-center justify-center cursor-pointer">
                      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                    </button>
                    <span className="font-bold">โหมดเอกสารส่งรายงานสลักหลังลายเซ็นคณะกรรมการ</span>
                  </div>
                  <div className="flex items-center gap-3">
                    <button onClick={() => { try { window.print(); } catch(e) {} }} className="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-lg font-bold flex items-center gap-2 transition cursor-pointer shadow">
                      กดสั่งพิมพ์ (Save as PDF)
                    </button>
                    <span className="text-xs bg-indigo-800 px-3 py-1 rounded">
                      * เลือกเครื่องพิมพ์เป็น "บันทึกเป็น PDF" ในหน้าต่างตั้งค่า
                    </span>
                  </div>
                </div>

                {/* A4 Sheet Container */}
                <div className="max-w-4xl mx-auto p-12 bg-white pt-24 print:pt-0 print:p-0">
                  <div className="text-center mb-8 border-b border-gray-300 pb-4">
                    <h1 className="text-2xl font-bold text-gray-900 leading-normal">ใบสรุปผลการประเมิน CURE Model v2</h1>
                    <p className="text-gray-600 text-sm mt-1">เกณฑ์มาตรฐานการรับรองความเหมาะสมปัญญาประดิษฐ์ทางการแพทย์สำหรับโรงพยาบาล</p>
                  </div>

                  {/* Project Summary info table */}
                  <div className="border border-gray-300 p-6 rounded-lg mb-6 shadow-sm print:shadow-none break-inside-avoid">
                    <h2 className="text-base font-bold text-gray-800 border-b pb-2 mb-4 bg-gray-50 -mx-6 px-6 -mt-6 rounded-t-lg">ข้อมูลโครงการ</h2>
                    <table className="w-full text-sm leading-relaxed text-left border-collapse">
                      <tbody>
                        <tr>
                          <td className="py-2 w-1/2 align-top">
                            <span className="text-gray-500 font-medium mr-2">ชื่อโครงการ:</span> 
                            <span className="font-bold text-gray-900">{projectInfo.projectName || '-'}</span>
                          </td>
                          <td className="py-2 w-1/2 align-top">
                            <span className="text-gray-500 font-medium mr-2">ผู้ขาย/Vendor:</span> 
                            <span className="font-bold text-gray-900">{projectInfo.vendor || '-'}</span>
                          </td>
                        </tr>
                        <tr>
                          <td className="py-2 w-1/2 align-top">
                            <span className="text-gray-500 font-medium mr-2">หน่วยงานที่ใช้งาน:</span> 
                            <span className="font-bold text-gray-900">{projectInfo.department || '-'}</span>
                          </td>
                          <td className="py-2 w-1/2 align-top">
                            <span className="text-gray-500 font-medium mr-2">ระดับความเสี่ยงทางคลินิก:</span> 
                            <span className="font-bold text-gray-900">{projectInfo.riskLevel}</span>
                          </td>
                        </tr>
                        <tr>
                          <td className="py-2 w-1/2 align-top">
                            <span className="text-gray-500 font-medium mr-2">ผู้บันทึกผลการประเมิน:</span> 
                            <span className="font-bold text-gray-900">{projectInfo.assessor || '-'}</span>
                          </td>
                          <td className="py-2 w-1/2 align-top">
                            <span className="text-gray-500 font-medium mr-2">วันที่ประเมิน:</span> 
                            <span className="font-bold text-gray-900">{projectInfo.assessmentDate ? new Date(projectInfo.assessmentDate).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }) : '-'}</span>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>

                  {/* Score breakdown metrics and critical stops column */}
                  <div className="grid grid-cols-2 gap-6 mb-6">
                    <div className="border border-gray-300 p-6 rounded-lg break-inside-avoid shadow-sm print:shadow-none">
                      <h2 className="text-base font-bold text-gray-800 mb-3 border-b pb-1">ดัชนีคะแนนรายมิติ</h2>
                      <div className="space-y-2 text-sm">
                        {rubrics.map(r => (
                          <div key={r.id} className="flex justify-between items-center border-b border-gray-100 pb-1">
                            <span className="text-gray-600">มิติที่ {r.id}: {r.name}</span>
                            <span className="font-bold">{r.questions.reduce((acc, q) => acc + (scores[q.id] || 0), 0)} / 8</span>
                          </div>
                        ))}
                        <div className="flex justify-between items-center pt-2 border-t border-gray-300 font-bold text-base text-indigo-700">
                          <span>รวมคะแนนสุทธิ</span>
                          <span>{totalScore} / 32 คะแนน</span>
                        </div>
                      </div>
                    </div>

                    <div className="border border-gray-300 p-6 rounded-lg break-inside-avoid shadow-sm print:shadow-none">
                      <h2 className="text-base font-bold text-gray-800 mb-3 border-b pb-1">มาตรการสแกนความปลอดภัย</h2>
                      {hasCriticalStop ? (
                        <div className="text-red-700">
                          <div className="flex items-center gap-1.5 font-bold mb-2 text-sm">
                            พบจุดขัดข้องเชิงโครงสร้าง (Critical Stop)
                          </div>
                          <ul className="list-disc pl-5 text-xs space-y-1">
                            {criticalFails.map((f, i) => <li key={i}>ประเมินตกหัวข้อบังคับ: {f}</li>)}
                            {missingMandatoryDocs.map((d, i) => <li key={i}>{d}</li>)}
                          </ul>
                        </div>
                      ) : (
                        <div className="text-green-700 flex flex-col items-center justify-center h-28 text-center">
                          <svg className="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                          <p className="font-bold text-sm">ผ่านเกณฑ์ความปลอดภัยสูงสุด</p>
                          <p className="text-xs">ไม่พบข้อขัดข้องระดับวิกฤต</p>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Summary status block */}
                  <div className={`p-4 rounded-lg border-2 ${statusColor} text-center mb-6 break-inside-avoid shadow-sm print:shadow-none`}>
                    <p className="text-xs font-bold uppercase opacity-80 mb-0.5">ผลสรุปมติการพิจารณาตัดสินใจ</p>
                    <p className="text-lg font-bold">{statusText}</p>
                  </div>

                  {/* AI Generated executive summary */}
                  <div className="border border-gray-300 p-6 rounded-lg mb-8 break-inside-avoid shadow-sm print:shadow-none">
                    <h2 className="text-base font-bold text-gray-900 mb-3 border-b pb-1">บทสรุปผู้บริหารและคำสั่งการ (Executive Summary)</h2>
                    <div className="text-gray-800 text-sm leading-relaxed whitespace-pre-line text-left">
                      {aiSummary || <span className="italic text-gray-400">ไม่ได้สร้างข้อความจำลองสรุปผู้บริหารผ่านระบบ AI (กรุณากลับไปกดปุ่ม "สร้างบทสรุป ✨" ในหน้าเว็บปกติก่อนดาวน์โหลดไฟล์)</span>}
                    </div>
                  </div>

                           <div className="mt-4 border-t pt-3">
                             <p className="text-xs text-orange-600 font-bold mb-1">💡 เกร็ดความรู้ในการเซฟไฟล์ PDF:</p>
                             <p className="text-xs text-gray-500 leading-normal">ในขั้นตอนตั้งค่าตัวเบราว์เซอร์ ให้เลือก Destination (เครื่องพิมพ์) เป็น "Save as PDF" หรือ "บันทึกเป็น PDF" จะทำให้ตัวหนังสือทุกตัวคมชัดสูงสุด ซูมไม่แตก และประหยัดพลังงานครับ</p>
                           </div>
                         </div>
                       </div>
                    </div>
                  )}

                  {/* Tab 8: ตั้งค่าคีย์ API */}
                  {activeTab === 'settings' && (
                    <div className="space-y-6 animate-fadeIn">
                      <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                        <h2 className="text-xl font-bold text-gray-800 mb-2">ตั้งค่า API Key</h2>
                        <p className="text-sm text-gray-500 mb-6">หากต้องการใช้ระบบ Google Gemini แท้ในการประมวลผลข้อเขียนวิเคราะห์ ให้กรอก API Key ด้านล่างนี้ (หากเว้นว่างไว้ ระบบจะใช้ Local Engine ในเครื่องแทนโดยอัตโนมัติ)</p>
                        
                        <div className="space-y-4">
                          <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Gemini API Key</label>
                            <input 
                              type="password" 
                              value={geminiKey} 
                              onChange={(e) => setGeminiKey(e.target.value)} 
                              className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-mono" 
                              placeholder="AIzaSy..." 
                            />
                          </div>
                        </div>
                      </div>
                      <div className="flex justify-end">
                        <button onClick={() => setActiveTab('info')} className="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold cursor-pointer hover:bg-indigo-700 transition">กลับไปหน้าประเมิน</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
              <style dangerouslySetInnerHTML={{__html: `.animate-fadeIn { animation: fadeIn 0.3s ease-in-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }`}} />

              {/* Reset Confirmation Modal */}
              {showResetModal && (
                <div className="fixed inset-0 bg-black/40 z-[100] flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full animate-fadeIn">
                    <div className="flex items-center gap-3 text-red-600 mb-3">
                      <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                      <h3 className="text-lg font-bold">ยืนยันการเริ่มใหม่?</h3>
                    </div>
                    <p className="text-gray-600 text-sm mb-6 leading-relaxed">ข้อมูลที่กรอกไว้ทั้งหมด รวมถึงคะแนนประเมินและรายการเอกสารจะถูกล้างและไม่สามารถกู้คืนได้ คุณต้องการดำเนินการต่อหรือไม่?</p>
                    <div className="flex justify-end gap-3">
                      <button onClick={() => setShowResetModal(false)} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 cursor-pointer font-medium transition">ยกเลิก</button>
                      <button onClick={confirmReset} className="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 cursor-pointer font-medium transition shadow-sm">ยืนยันล้างข้อมูล</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // Mounting App to the HTML DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CureModelApp />);
    </script>
</body>
</html>
