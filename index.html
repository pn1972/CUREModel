          { term: "Data governance", desc: "ระบบกำกับดูแลข้อมูล เช่น ใครเป็นเจ้าของข้อมูล ใครเข้าถึงได้ ใช้เพื่ออะไร เก็บนานเท่าไร และตรวจสอบอย่างไร" },
          { term: "Data integrity", desc: "ความครบถ้วน ถูกต้อง ไม่ถูกแก้ไขโดยไม่ได้รับอนุญาต และตรวจสอบแหล่งที่มาของข้อมูลได้" },
          { term: "Data ownership", desc: "สิทธิและอำนาจในการควบคุมข้อมูล ต้องแยกให้ชัดระหว่างสิทธิของผู้ป่วย สิทธิของโรงพยาบาล และสิทธิของผู้ขาย" },
          { term: "De-identification", desc: "การลดหรือลบข้อมูลที่ระบุตัวบุคคลออก เพื่อลดความเสี่ยงการระบุตัวผู้ป่วย" },
          { term: "DICOM", desc: "มาตรฐานไฟล์และการสื่อสารสำหรับภาพทางการแพทย์ เช่น X-ray, CT, MRI และ ultrasound" },
          { term: "DPA (Data Processing Agreement)", desc: "ข้อตกลงระหว่างผู้ควบคุมข้อมูลและผู้ประมวลผลข้อมูล เพื่อกำหนดหน้าที่ ขอบเขต และมาตรการคุ้มครองข้อมูล" },
          { term: "DPIA (Data Protection Impact Assessment)", desc: "การประเมินผลกระทบด้านการคุ้มครองข้อมูลส่วนบุคคล โดยเฉพาะโครงการที่ใช้ข้อมูลสุขภาพหรือข้อมูลอ่อนไหวจำนวนมาก" },
          { term: "DR Plan (Disaster Recovery Plan)", desc: "แผนกู้คืนระบบเมื่อเกิดเหตุร้ายแรง เช่น ระบบล่ม ข้อมูลเสียหาย ไฟไหม้ หรือถูกโจมตีไซเบอร์" },
          { term: "EMR/EHR", desc: "เวชระเบียนอิเล็กทรอนิกส์ของผู้ป่วย ใช้เก็บข้อมูลการรักษา ประวัติ ตรวจร่างกาย ผลการตรวจทางห้องปฏิบัติการ และคำสั่งรักษา" },
          { term: "Encryption", desc: "การเข้ารหัสข้อมูลเพื่อให้ผู้ที่ไม่มีสิทธิ์ไม่สามารถอ่านข้อมูลได้ ทั้งขณะส่งผ่านเครือข่ายและขณะจัดเก็บ" },
          { term: "Equity", desc: "ความเสมอภาคในการเข้าถึงประโยชน์จาก AI โดยคำนึงถึงกลุ่มเปราะบาง คนชนบท ผู้สูงอายุ ผู้พิการ หรือผู้มีข้อจำกัดด้านทรัพยากร" },
          { term: "Exit strategy", desc: "แผนเมื่อเลิกใช้หรือเปลี่ยนผู้ขาย เช่น การส่งคืน/ลบข้อมูล การส่งออกข้อมูล และความต่อเนื่องของบริการ" },
          { term: "Explainability", desc: "ความสามารถของ AI ในการอธิบายเหตุผลหรือหลักฐานประกอบผลลัพธ์ เพื่อให้ผู้ใช้เข้าใจและตรวจสอบได้" },
          { term: "External validation", desc: "การทดสอบ AI กับข้อมูลจากแหล่งอื่นนอกเหนือจากข้อมูลที่ใช้พัฒนาโมเดล เพื่อลดความเสี่ยงว่า AI เก่งเฉพาะชุดข้อมูลเดิม" },
          { term: "Fairness", desc: "ความเป็นธรรมของ AI คือไม่ทำให้ผู้ป่วยบางกลุ่มได้ผลลัพธ์ด้อยกว่าโดยไม่มีเหตุผลอันสมควร" },
          { term: "False negative", desc: "AI แจ้งว่าปกติหรือไม่มีโรค ทั้งที่ความจริงมีโรค อาจทำให้วินิจฉัยล่าช้าหรือพลาดการรักษาที่จำเป็น" },
          { term: "False positive", desc: "AI แจ้งว่าผิดปกติหรือมีโรค ทั้งที่ความจริงไม่มีโรค อาจทำให้ตรวจเพิ่ม รักษาเกินจำเป็น หรือเกิดความกังวล" },
          { term: "FHIR", desc: "มาตรฐานข้อมูลสุขภาพรุ่นใหม่ที่ช่วยให้ระบบต่าง ๆ เชื่อมต่อและแลกเปลี่ยนข้อมูลได้ง่ายขึ้น" },
          { term: "Generalizability", desc: "ความสามารถของ AI ในการทำงานได้ดีเมื่อใช้กับประชากร สถานที่ เครื่องมือ หรือช่วงเวลาที่ต่างจากข้อมูลที่ใช้พัฒนา" },
          { term: "Health literacy", desc: "ความสามารถของผู้ป่วยหรือประชาชนในการเข้าใจข้อมูลสุขภาพ จึงควรใช้คำอธิบาย AI ที่ไม่ซับซ้อนเกินไป" },
          { term: "Heatmap", desc: "ภาพหรือสีที่แสดงตำแหน่งหรือบริเวณที่ AI ให้ความสำคัญ เช่น จุดบนภาพ X-ray ที่ทำให้ AI สงสัยโรค" },
          { term: "HIS (Hospital Information System)", desc: "ระบบสารสนเทศหลักของโรงพยาบาลที่ใช้บริหารข้อมูลบริการ เช่น เวชระเบียน นัดหมาย คำสั่งยา และการเงิน" },
          { term: "HL7", desc: "มาตรฐานแลกเปลี่ยนข้อมูลสุขภาพระหว่างระบบ เช่น ข้อมูลผู้ป่วย คำสั่งตรวจ และผลตรวจ" },
          { term: "Human-in-the-loop", desc: "การมีมนุษย์กำกับ ตรวจสอบ หรืออนุมัติการตัดสินใจสำคัญของ AI โดยเฉพาะงานที่กระทบการวินิจฉัยหรือการรักษา" },
          { term: "Incident response plan", desc: "แผนตอบสนองเมื่อเกิดเหตุ เช่น ข้อมูลรั่ว ระบบล่ม ผล AI ผิดพลาด หรือถูกโจมตีไซเบอร์" },
          { term: "Informed consent", desc: "การให้ข้อมูลอย่างเพียงพอแก่ผู้ป่วยหรือเจ้าของข้อมูลก่อนขอความยินยอม รวมถึงวัตถุประสงค์ ประโยชน์ ความเสี่ยง และทางเลือก" },
          { term: "Intended use", desc: "วัตถุประสงค์การใช้งานที่ผู้พัฒนาหรือโรงพยาบาลกำหนดไว้ เช่น ใช้เพื่อช่วยคัดกรอง ไม่ใช้ใช้แทนการวินิจฉัยของแพทย์" },
          { term: "Interpretability", desc: "ความสามารถของผู้ใช้ในการตีความผล AI ได้ถูกต้อง เช่น เข้าใจว่าคะแนน ความเสี่ยง หรือสีบนภาพหมายถึงอะไร" },
          { term: "IRB/EC", desc: "คณะกรรมการจริยธรรมการวิจัยในมนุษย์ ใช้พิจารณาเมื่อโครงการเข้าข่ายวิจัยหรือใช้ข้อมูล/ผู้ป่วยในลักษณะที่ต้องกำกับด้านจริยธรรม" },
          { term: "Latency/Turnaround time", desc: "เวลาตั้งแต่ส่งข้อมูลเข้า AI จนได้ผลลัพธ์กลับมา ต้องเหมาะกับความเร่งด่วนของงาน เช่น stroke ต้องเร็วมาก" },
          { term: "Lawful basis", desc: "ฐานทางกฎหมายที่อนุญาตให้เก็บ ใช้ หรือเปิดเผยข้อมูลส่วนบุคคล เช่น ความยินยอม สัญญา ประโยชน์ด้านสาธารณสุข หรือหน้าที่ตามกฎหมาย" },
          { term: "Liability", desc: "ความรับผิดทางกฎหมายหรือวิชาชีพเมื่อเกิดความเสียหาย เช่น ความผิดพลาดจาก AI ผู้ใช้ ระบบ หรือผู้ขาย" },
          { term: "Local validation", desc: "การทดสอบ AI กับข้อมูล ผู้ป่วย เครื่องมือ หรือบริบทที่ใกล้เคียงกับโรงพยาบาลที่จะใช้จริง เพื่อยืนยันว่า AI ทำงานได้จริงในบริบทนั้น" },
          { term: "Medical AI", desc: "AI ที่ใช้ในงานสุขภาพหรือการแพทย์ เช่น คัดกรอง วินิจฉัย ทำนายความเสี่ยง จัดลำดับคิว หรือช่วยสรุปข้อมูลเวชระเบียน" },
          { term: "MFA (Multi-Factor Authentication)", desc: "การยืนยันตัวตนหลายปัจจัย เช่น รหัสผ่านร่วมกับรหัส OTP หรือแอปยืนยันตัวตน" },
          { term: "Model drift", desc: "ภาวะที่ประสิทธิภาพ AI เปลี่ยนไปเมื่อข้อมูลจริงเปลี่ยน เช่น โรคเปลี่ยน ประชากรเปลี่ยน เครื่องมือเปลี่ยน หรือแนวทางรักษาเปลี่ยน" },
          { term: "Model lifecycle", desc: "วงจรชีวิตของโมเดลตั้งแต่พัฒนา ตรวจสอบ ติดตั้ง เฝ้าระวัง อัปเดต หยุดใช้ หรือเปลี่ยนเวอร์ชัน" },
          { term: "NPV (Negative Predictive Value)", desc: "เมื่อ AI บอกว่าผลเป็นลบ โอกาสที่ผู้ป่วยไม่มีภาวะนั้นจริงมีมากน้อยเพียงใด" },
          { term: "Override", desc: "ช่องทางให้ผู้ใช้ที่มีอำนาจสามารถไม่เห็นด้วย แก้ไข ยกเลิก หรือหยุดผลลัพธ์/คำแนะนำของ AI ได้อย่างปลอดภัย" },
          { term: "PACS", desc: "ระบบจัดเก็บและแสดงภาพทางรังสีวิทยา เช่น X-ray, CT, MRI ที่ใช้ในงานรังสีวินิจฉัย" },
          { term: "Patient communication", desc: "การสื่อสารกับผู้ป่วยด้วยภาษาที่เข้าใจง่ายเกี่ยวกับบทบาทของ AI ประโยชน์ ความเสี่ยง และสิทธิของผู้ป่วย" },
          { term: "PDPA", desc: "พระราชบัญญัติคุ้มครองข้อมูลส่วนบุคคลของไทย กำหนดหลักการเก็บ ใช้ เปิดเผย และคุ้มครองข้อมูลส่วนบุคคล" },
          { term: "Penetration test", desc: "การทดสอบเจาะระบบโดยผู้เชี่ยวชาญเพื่อหาช่องโหว่ก่อนใช้งานจริง" },
          { term: "PII / PHI", desc: "ข้อมูลที่ระบุตัวบุคคลได้หรือข้อมูลสุขภาพที่เกี่ยวข้องกับบุคคล เช่น ชื่อ เลขบัตรประชาชน HN ภาพถ่าย หรือผลตรวจ" },
          { term: "Pilot", desc: "การทดลองใช้ในวงจำกัด เช่น เฉพาะแผนก เฉพาะช่วงเวลา หรือเฉพาะกลุ่มผู้ป่วย เพื่อประเมินผลจริงก่อนขยายผล" },
          { term: "Post-deployment monitoring", desc: "การติดตามผลหลังใช้งานจริง เช่น ความแม่นยำจริง อัตราแจ้งเตือนผิดพลาด ผลกระทบต่อผู้ป่วย และปัญหาที่เกิดใน workflow" },
          { term: "PPV (Positive Predictive Value)", desc: "เมื่อ AI บอกว่าผลเป็นบวก โอกาสที่ผู้ป่วยมีภาวะนั้นจริงมีมากน้อยเพียงใด" },
          { term: "Professional autonomy", desc: "อิสระและวิจารณญาณทางวิชาชีพของบุคลากรทางการแพทย์ ไม่ถูก AI หรือระบบบริหารบังคับให้ทำตามโดยไม่มีเหตุผล" },
          { term: "PROGRESS-Plus", desc: "กรอบตรวจสอบปัจจัยความเหลื่อมล้ำ เช่น ถิ่นที่อยู่ เชื้อชาติ อาชีพ เพศ ศาสนา การศึกษา ฐานะทางเศรษฐกิจ ต้นทุนทางสังคม อายุ และความพิการ" },
          { term: "Pseudonymization", desc: "การแทนข้อมูลระบุตัวบุคคลด้วยรหัสหรือตัวแทน โดยยังอาจย้อนกลับได้ถ้ามีกุญแจหรือข้อมูลเชื่อมโยง" },
          { term: "RACI Matrix", desc: "ตารางแสดงบทบาทหน้าที่ (Responsible, Accountable, Consulted, Informed) เพื่อกำหนดชัดเจนว่าใครต้องทำหน้าที่อะไร" },
          { term: "Robustness", desc: "ความแข็งแรงของระบบเมื่อเจอข้อมูลไม่สมบูรณ์ ภาพคุณภาพต่ำ สัญญาณรบกวน หรือสถานการณ์ที่ต่างจากชุดข้อมูลเดิม" },
          { term: "ROI (Return on Investment)", desc: "ผลตอบแทนจากการลงทุน เทียบประโยชน์ที่ได้กับต้นทุนที่จ่าย เช่น ลดเวลารอ ลดค่าใช้จ่าย หรือเพิ่มประสิทธิภาพ" },
          { term: "Rollback", desc: "กระบวนการย้อนกลับไปใช้โมเดลหรือระบบเวอร์ชันก่อนหน้าเมื่อพบความผิดปกติหรือความเสี่ยงจากเวอร์ชันใหม่" },
          { term: "SaMD (Software as a Medical Device)", desc: "ซอฟต์แวร์ที่มีวัตถุประสงค์ทางการแพทย์และทำงานเป็นเครื่องมือแพทย์ได้ด้วยตัวเอง โดยไม่จำเป็นต้องเป็นส่วนหนึ่งของอุปกรณ์แพทย์" },
          { term: "Sandbox", desc: "สภาพแวดล้อมจำลองหรือพื้นที่ทดลองที่แยกจากระบบบริการจริง ใช้ทดสอบ AI ก่อนเชื่อมต่อกับ workflow จริง" },
          { term: "Sensitivity", desc: "ความสามารถของ AI ในการตรวจพบผู้ที่มีโรคจริง ค่ายิ่งสูงยิ่งลดโอกาสพลาดผู้ป่วยที่ควรถูกตรวจพบ" },
          { term: "SLA (Service Level Agreement)", desc: "ข้อตกลงระดับการให้บริการ เช่น เวลาระบบพร้อมใช้งาน เวลาตอบสนอง และระยะเวลาซ่อมเมื่อระบบล่ม" },
          { term: "Specificity", desc: "ความสามารถของ AI ในการระบุผู้ที่ไม่มีโรคได้ถูกต้อง ค่ายิ่งสูงยิ่งลดโอกาสแจ้งเตือนเกินจำเป็นในคนปกติ" },
          { term: "SSO (Single Sign-On)", desc: "ระบบล็อกอินครั้งเดียวที่เชื่อมกับบัญชีผู้ใช้ขององค์กร ช่วยควบคุมสิทธิ์และยกเลิกสิทธิ์ได้เป็นระบบ" },
          { term: "Subgroup analysis", desc: "การวิเคราะห์ผลลัพธ์แยกตามกลุ่มย่อย เช่น อายุ เพศ โรคร่วม ภูมิภาค ชนิดเครื่องมือ หรือกลุ่มเปราะบาง" },
          { term: "Target population", desc: "กลุ่มผู้ป่วยหรือผู้รับบริการที่ AI จะนำไปใช้จริง เช่น ผู้ใหญ่ เด็ก ผู้สูงอายุ ผู้ป่วย OPD หรือผู้ป่วยฉุกเฉิน" },
          { term: "TCO (Total Cost of Ownership)", desc: "ต้นทุนรวมตลอดอายุการใช้งาน รวมค่าซื้อ ค่าระบบ ค่าบำรุงรักษา ค่าสมัครสมาชิก ค่าอบรม และค่าเปลี่ยนระบบ" },
          { term: "Thai FDA", desc: "สำนักงานคณะกรรมการอาหารและยา หน่วยงานกำกับดูแลเครื่องมือแพทย์ในประเทศไทย" },

          { term: "User acceptance", desc: "ระดับการยอมรับของผู้ใช้จริง เช่น แพทย์ พยาบาล ว่า AI มีประโยชน์ เข้าใจง่าย และไม่ขัดขวางงาน" },
          { term: "USFDA", desc: "หน่วยงานกำกับดูแลอาหาร ยา และเครื่องมือแพทย์ของสหรัฐอเมริกา" },
          { term: "Vendor lock-in", desc: "ภาวะที่โรงพยาบาลพึ่งพาผู้ขายรายเดียวมากเกินไป ย้ายข้อมูล เปลี่ยนระบบ หรือหยุดสัญญาได้ยาก" },
          { term: "Vulnerability assessment", desc: "การประเมินหาช่องโหว่ด้านความปลอดภัยของระบบ ซอฟต์แวร์ เครือข่าย หรือการตั้งค่า" },
          { term: "Workflow", desc: "ลำดับขั้นตอนการทำงานจริงของบุคลากร เช่น ใครส่งข้อมูลให้ AI ผล AI แสดงตรงไหน ใครเป็นผู้ยืนยันผล" },
          { term: "Workflow integration", desc: "การเชื่อม AI เข้าไปในขั้นตอนงานเดิมอย่างราบรื่น ลดการกรอกข้อมูลซ้ำ ลดการสลับหน้าจอ และไม่เพิ่มภาระงาน" }
        ];

        function SVGIcon({ name, className = "w-5 h-5" }) {

        function CureModelApp() {
          const [activeView, setActiveView] = useState('info'); // ควบคุมหน้าที่จะแสดง: 'info', 'C1', 'C2', ..., 'glossary', 'summary'
          const [expandedDims, setExpandedDims] = useState({ C: true, U: false, R: false, E: false }); // ควบคุมการเปิด/ปิดเมนูมิติ
          const [isPrintMode, setIsPrintMode] = useState(false); 
          const [showResetModal, setShowResetModal] = useState(false);
          const [searchTerm, setSearchTerm] = useState('');
          
          const [projectInfo, setProjectInfo] = useState({
            projectName: '', vendor: '', department: '', assessor: '', assessmentDate: '', riskLevel: 'ปานกลาง'
          });
          const [scores, setScores] = useState({});
          const [docs, setDocs] = useState({});

          const [aiSummary, setAiSummary] = useState('');
          const [isGeneratingSummary, setIsGeneratingSummary] = useState(false);
          const [aiEmailDraft, setAiEmailDraft] = useState('');
          const [isGeneratingEmail, setIsGeneratingEmail] = useState(false);
          const [geminiKey, setGeminiKey] = useState('');

          // สร้าง Navigation Flow สำหรับปุ่ม ถัดไป/ย้อนกลับ
          const navFlow = useMemo(() => {
            const flow = ['info'];
            rubrics.forEach(dim => dim.questions.forEach(q => flow.push(q.id)));
            flow.push('glossary', 'summary');
            return flow;
          }, []);

          const allDocItems = useMemo(() => {
            return documentChecklist.reduce((acc, cat) => [...acc, ...cat.items], []);
          }, []);

          const handleScoreChange = (qId, score) => setScores(prev => ({ ...prev, [qId]: score }));
          const handleDocChange = (docId) => setDocs(prev => ({ ...prev, [docId]: !prev[docId] }));
          const handleInfoChange = (e) => setProjectInfo(prev => ({ ...prev, [e.target.name]: e.target.value }));
          const toggleDim = (dimId) => setExpandedDims(prev => ({ ...prev, [dimId]: !prev[dimId] }));

          const scrollToSection = (sectionId) => {
            const el = document.getElementById(sectionId);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          };

          const handleNavChange = (newView) => {
            setActiveView(newView);
            // ถ้ากดข้อย่อย (เช่น C1) ให้สั่งกางเมนูมิตินั้นๆ ออกอัตโนมัติ
            if (/^[CURE][1-4]$/.test(newView)) {
              const dimId = newView.charAt(0);
              setExpandedDims(prev => ({ ...prev, [dimId]: true }));
            }
            window.scrollTo(0, 0);
          };

          const confirmReset = () => {
            setProjectInfo({ projectName: '', vendor: '', department: '', assessor: '', assessmentDate: '', riskLevel: 'ปานกลาง' });
            
            const initScores = {};
            rubrics.forEach(r => r.questions.forEach(q => initScores[q.id] = null));
            setScores(initScores);
            
            const initDocs = {};
            documentChecklist.forEach(c => c.items.forEach(i => initDocs[i.id] = false));
            setDocs(initDocs);
            
            setAiSummary('');
            setAiEmailDraft('');
            setActiveView('info');
            setShowResetModal(false);
          };

          const generateOfflineSummary = () => {
            const { totalScore, statusText, criticalFails, missingMandatoryDocs } = evaluationResult;
            let text = `บทสรุปผู้บริหาร: โครงการประเมินความเหมาะสมของการนำระบบปัญญาประดิษฐ์ทางการแพทย์มาใช้ในสถานพยาบาล\n\n`;
            text += `จากการตรวจประเมินเทคโนโลยีปัญญาประดิษฐ์ "${projectInfo.projectName || 'ระบบจำลอง'} " พัฒนาโดย "${projectInfo.vendor || 'ผู้ผลิต/คู่ค้า'}" สำหรับติดตั้งใช้งาน ณ แผนก "${projectInfo.department || 'ไม่ระบุหน่วยงาน'}" ภายใต้เกณฑ์มาตรฐานสากล CURE Model v2 พบว่าได้รับคะแนนสุทธิ ${totalScore} คะแนน จากคะแนนเต็ม 32 คะแนน\n\n`;
            
            if (criticalFails.length > 0 || missingMandatoryDocs.length > 0) {
              text += `ความเห็นและข้อพิจารณาวิกฤต (Critical Alerts):\nโครงการนี้ "ไม่ผ่านเกณฑ์การพิจารณาด้านความปลอดภัยขั้นต่ำ" เนื่องจากพบบันทึกความบกพร่องทางกฎหมาย เทคโนโลยี หรือความเสี่ยงต่อผู้ป่วย ดังนี้:\n`;
              if (criticalFails.length > 0) {
                text += `- มีข้อประเมินที่ระดับวิกฤต (Critical Questions) ได้รับ 0 คะแนน ในประเด็น: ${criticalFails.join(', ')}\n`;
              }
              if (missingMandatoryDocs.length > 0) {
                text += `- ขาดเอกสารรับรองภาคบังคับ: ${missingMandatoryDocs.join(', ')}\n`;
              }
              text += `\nมติที่ประชุม:\nมีมติส่งคืนแบบคำขอเพื่อส่งเรื่องกลับไปยังผู้ขาย ให้ทำการจัดส่งเอกสารและปรับปรุงระบบการทำงานในประเด็นวิกฤตข้างต้นให้สมบูรณ์ ก่อนนำกลับมาเสนอต่อคณะอนุกรรมการเพื่อพิจารณาใหม่อีกครั้ง`;
            } else {
              if (totalScore >= 26) {
                text += `มติที่ประชุมและแนวทางดำเนินการ (Ready to Deploy):\nโครงการผ่านเกณฑ์การประเมินในระดับดีเยี่ยม ไม่มีเงื่อนไขขัดข้องด้านกฎหมายและความปลอดภัย ไซเบอร์ อนุมัติเห็นควรให้นำระบบจัดซื้อจัดจ้างตามขั้นตอนและเปิดเชื่อมเข้าสู่เครือข่าย HIS ของโรงพยาบาลได้โดยทันที โดยให้มีแผนการตรวจสอบคุณภาพแบบจำลอง (Model drift) ตามกำหนดการทุกๆ 6 เดือน`;
              } else if (totalScore >= 17) {
                text += `มติที่ประชุมและแนวทางดำเนินการ (Sandbox Pilot):\nโครงการได้รับการประเมินความพร้อมในระดับปานกลาง มีคุณค่าและคุณประโยชน์ทางคลินิกแต่อาจต้องปรับปรุงคู่มือการอบรมเพิ่มเติม คณะกรรมการมีมติเห็นสมควร "อนุมัติให้นำร่องทดลองใช้งานจำกัดวง (Sandbox)" เป็นระยะเวลา 3-6 เดือน โดยติดตั้งระบบแจ้งเตือนและวัดตัวชี้วัดผลลัพธ์ (KPI) อย่างเข้มงวดก่อนพิจารณาอนุมัติใช้จริงถัดไป`;
              } else {
                text += `มติที่ประชุมและแนวทางดำเนินการ (Rejected):\nโครงการได้คะแนนรวมต่ำกว่าเกณฑ์ขั้นต่ำ (น้อยกว่า 17 คะแนน) ขาดความพร้อมของคู่มือและการออกแบบเวิร์กโฟลว์ใช้งาน มีมติ "ไม่อนุมัติโครงการ" เพื่อความปลอดภัยของข้อมูลสุขภาพและวิชาชีพ`;
              }
            }
            return text;
          };

          const generateOfflineEmail = () => {
            const missingDocs = [];
            allDocItems.forEach(item => { if (!docs[item.id]) missingDocs.push(item.text); });
            
            let text = `เรื่อง: ขอความอนุเคราะห์จัดส่งเอกสารรับรองมาตรฐานเพิ่มเติมประกอบการพิจารณาประเมินเทคโนโลยี AI\n`;
            text += `เรียน: ฝ่ายประสานงานจัดซื้อ บริษัท ${projectInfo.vendor || '(ชื่อบริษัทคู่ค้า)'}\n\n`;
            text += `ตามที่โรงพยาบาลได้ดำเนินการพิจารณาประเมินความพร้อมเชิงเทคนิคและคลินิก สำหรับโครงการปัญญาประดิษฐ์ทางการแพทย์ "${projectInfo.projectName || 'ระบบจำลอง'}" ตามมาตรฐาน CURE Model v2 ของโรงพยาบาลนั้น\n\n`;
            text += `คณะทำงานฯ ตรวจสอบพบบันทึกความบกพร่องของเอกสารแนบสำคัญ ใคร่ขอความร่วมมือจากทางคู่ค้าจัดส่งเอกสารรับรองความถูกต้องเพิ่มเติมดังรายการดังต่อไปนี้:\n\n`;
            
            missingDocs.slice(0, 8).forEach((d, idx) => {
              text += `${idx + 1}. ${d}\n`;
            });
            if (missingDocs.length > 8) {
              text += `...และเอกสารข้อกำหนดความพร้อมด้าน IT, ความปลอดภัยไซเบอร์ อื่นๆ รวมทั้งสิ้น ${missingDocs.length} ฉบับ\n`;
            }
            
            text += `\nจึงเรียนมาเพื่อโปรดพิจารณาและดำเนินการจัดส่งเอกสารดังกล่าวกลับมายังคณะอนุกรรมการฯ เพื่อสแกนนำเสนอผู้อำนวยการอนุมัติสัญญาในขั้นตอนถัดไป\n\n`;
            text += `ขอแสดงความนับถือ\nคณะทำงานประเมินความปลอดภัยปัญญาประดิษฐ์ทางการแพทย์\nฝ่ายสารสนเทศและเทคโนโลยีทางการแพทย์`;
            return text;
          };

          const callGemini = async (prompt) => {
            const key = geminiKey.trim();
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${key}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };
            const delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i < 6; i++) {
              try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
              } catch (err) {
                if (i === 5) throw err;
                await new Promise(resolve => setTimeout(resolve, delays[i]));
              }
            }
          };

          const handleGenerateEmail = async () => {
            setIsGeneratingEmail(true);
            if (!geminiKey.trim()) {
              setTimeout(() => {
                setAiEmailDraft(generateOfflineEmail());
                setIsGeneratingEmail(false);
              }, 600);
              return;
            }

            const missingDocs = [];
            allDocItems.forEach(item => { if (!docs[item.id]) missingDocs.push(item.text); });
            if (missingDocs.length === 0) { setAiEmailDraft("เอกสารแนบครบถ้วนดีแล้ว ไม่จำเป็นต้องทำแบบคำร้องขอเอกสารเพิ่มเติมครับ"); setIsGeneratingEmail(false); return; }

            const prompt = `คุณคือเจ้าหน้าที่ประเมินโครงการ AI ของโรงพยาบาล ช่วยร่างอีเมลภาษาไทยแบบเป็นทางการและสุภาพ เพื่อขอเอกสารเพิ่มเติมจากบริษัทผู้พัฒนา/ผู้ขาย (${projectInfo.vendor || 'ระบุชื่อบริษัท'}) สำหรับโครงการ "${projectInfo.projectName || 'ไม่ระบุชื่อโครงการ'}" โดยรายการเอกสารที่ขาดและจำเป็นต้องใช้ประกอบการพิจารณามีดังนี้:\n\n${missingDocs.map(d => "- " + d).join('\n')}\n\nขอให้เขียนเป็นอีเมลที่พร้อมคัดลอกไปส่งได้เลย มีคำขึ้นต้นและคำลงท้ายที่เหมาะสม`;
            try {
              const result = await callGemini(prompt);
              setAiEmailDraft(result || generateOfflineEmail());
            } catch (error) { 
              setAiEmailDraft(generateOfflineEmail()); 
            }
            setIsGeneratingEmail(false);
          };

          const handleGenerateSummary = async () => {
            setIsGeneratingSummary(true);
            if (!geminiKey.trim()) {
              setTimeout(() => {
                setAiSummary(generateOfflineSummary());
                setIsGeneratingSummary(false);
              }, 700);
              return;
            }

            const { totalScore, statusText, criticalFails, missingMandatoryDocs } = evaluationResult;

                              if (currIdx < navFlow.length - 1) handleNavChange(navFlow[currIdx + 1]);
                            }} 
                            className="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 cursor-pointer font-medium shadow-sm"
                          >
                            บันทึกและไปข้อถัดไป
                          </button>
                        </div>
                      </div>
                    );
                  })()}

                  {/* Tab: อภิธานศัพท์ */}
                  {activeView === 'glossary' && renderGlossaryTab()}

                  {/* Tab: ผลสรุป */}
                  {activeView === 'summary' && (
                    <div className="space-y-6 animate-fadeIn">
                       <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm text-center">
                         <h2 className="text-2xl font-bold text-gray-900 mb-2">มติการพิจารณาตัดสินใจเบื้องต้น</h2>
                         <p className="text-gray-600 mb-6 font-medium">สแกนผลคะแนนและจัดพรีวิวเอกสารขนาด A4 เสนอผู้อำนวยการลงนามสั่งซื้อ</p>
                         
                         <div className="bg-indigo-50 p-6 rounded-xl border border-indigo-200 text-left mb-8">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                              <h2 className="text-lg font-bold text-indigo-900">บทสรุปผู้บริหารโดย AI</h2>
                              <button onClick={handleGenerateSummary} disabled={isGeneratingSummary} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-700 cursor-pointer transition disabled:opacity-50 shadow-sm">
                                {isGeneratingSummary ? "กำลังวิเคราะห์..." : "สร้างข้อเขียนสรุป ✨"}
                              </button>
                            </div>
                            {aiSummary ? (
                              <div className="prose prose-sm text-gray-800 whitespace-pre-line bg-white p-4 rounded-lg border border-indigo-100 shadow-inner font-sarabun">
                                {aiSummary}
                              </div>
                            ) : (
                              <p className="text-sm text-indigo-600/70 italic">กดยืนยันเพื่อสรุปวิเคราะห์ผลคะแนนเป็นประโยคข้อเขียนภาษาราชการ</p>
                            )}
                         </div>

                         {/* AI Draft Email request moved to Summary */}
                         <div className="bg-blue-50/50 p-6 rounded-xl border border-blue-100 text-left mb-8">
                           <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                             <div>
                               <h3 className="font-bold text-blue-800 text-base">ตัวช่วยสร้างหนังสือทวงถามเอกสารเพิ่มเติม</h3>
                               <p className="text-xs text-gray-500">จำลองการประดิษฐ์จดหมายขอเอกสารบังคับที่ขาดอยู่จากผู้ขาย</p>
                             </div>
                             <button 
                               onClick={handleGenerateEmail} 
                               disabled={isGeneratingEmail} 
                               className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 cursor-pointer transition disabled:opacity-50 whitespace-nowrap shadow-sm"
                             >
                               {isGeneratingEmail ? "กำลังประมวล..." : "ร่างจดหมายทวงเอกสาร ✨"}
                             </button>
                           </div>
                           {aiEmailDraft && <textarea className="w-full h-48 p-3 text-sm border border-gray-300 rounded-lg bg-white shadow-inner focus:ring-2 focus:ring-blue-500 outline-none font-sarabun" value={aiEmailDraft} onChange={(e) => setAiEmailDraft(e.target.value)} />}
                         </div>

                         <div className="bg-white p-6 rounded-xl border border-gray-200 mb-4 max-w-lg mx-auto shadow-sm text-left">
                           <p className="text-sm text-gray-600 font-semibold mb-3">เมื่อคลิกปุ่ม ระบบจะจัดหน้าสำหรับสั่งพิมพ์สลักหลังลายเซ็นขนาด A4 ให้ทันที</p>
                           <button 
                             onClick={() => setIsPrintMode(true)} 
                             className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 inline-flex items-center gap-2 font-bold shadow-md w-full justify-center text-lg transition-transform hover:scale-105 cursor-pointer"
                           >
                             เปิดโหมดสั่งพิมพ์ / Save as PDF
                           </button>
                           
                           <div className="mt-4 border-t pt-3">
                             <p className="text-xs text-orange-600 font-bold mb-1">💡 เกร็ดความรู้ในการเซฟไฟล์ PDF:</p>
                             <p className="text-xs text-gray-500 leading-normal">ในขั้นตอนตั้งค่าตัวเบราว์เซอร์ ให้เลือก Destination (เครื่องพิมพ์) เป็น "Save as PDF" หรือ "บันทึกเป็น PDF" จะทำให้ตัวหนังสือทุกตัวคมชัดสูงสุด ซูมไม่แตก และประหยัดพลังงานครับ</p>
                           </div>
                         </div>
                       </div>
                    </div>
                  )}

                  {/* Tab 8: ตั้งค่าคีย์ API */}
                  {activeView === 'settings' && (
                    <div className="space-y-6 animate-fadeIn">
                      <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                        <h2 className="text-xl font-bold text-gray-800 mb-2">ตั้งค่า API Key</h2>
                        <p className="text-sm text-gray-500 mb-6">หากต้องการใช้ระบบ Google Gemini แท้ในการประมวลผลข้อเขียนวิเคราะห์ ให้กรอก API Key ด้านล่างนี้ (หากเว้นว่างไว้ ระบบจะใช้ Local Engine ในเครื่องแทนโดยอัตโนมัติ)</p>
                        
                        <div className="space-y-4">
                          <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Gemini API Key</label>
                            <input 
                              type="password" 
                              value={geminiKey} 
                              onChange={(e) => setGeminiKey(e.target.value)} 
                              className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-mono" 
                              placeholder="AIzaSy..." 
                            />
                          </div>
                        </div>
                      </div>
                      <div className="flex justify-end">
                        <button onClick={() => handleNavChange('info')} className="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold cursor-pointer hover:bg-indigo-700 transition">กลับไปหน้าประเมิน</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
              <style dangerouslySetInnerHTML={{__html: `.animate-fadeIn { animation: fadeIn 0.3s ease-in-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }`}} />

              {/* Reset Confirmation Modal */}
              {showResetModal && (
                <div className="fixed inset-0 bg-black/40 z-[100] flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full animate-fadeIn">
                    <div className="flex items-center gap-3 text-red-600 mb-3">
                      <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                      <h3 className="text-lg font-bold">ยืนยันการเริ่มใหม่?</h3>
                    </div>
                    <p className="text-gray-600 text-sm mb-6 leading-relaxed">ข้อมูลที่กรอกไว้ทั้งหมด รวมถึงคะแนนประเมินและรายการเอกสารจะถูกล้างและไม่สามารถกู้คืนได้ คุณต้องการดำเนินการต่อหรือไม่?</p>
                    <div className="flex justify-end gap-3">
                      <button onClick={() => setShowResetModal(false)} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 cursor-pointer font-medium transition">ยกเลิก</button>
                      <button onClick={confirmReset} className="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 cursor-pointer font-medium transition shadow-sm">ยืนยันล้างข้อมูล</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // Mounting App to the HTML DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CureModelApp />);
    </script>
</body>
</html>
